<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Проект</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase-config.js"></script>

<style>
body {
  margin:0;
  background:#0f0c0a;
  color:#fff;
  font-family:Arial;
  padding:20px;
}
img { max-width:100%; border-radius:10px; }
</style>
</head>

<body>

<h1 id="title">Загрузка...</h1>
<p id="desc"></p>
<img id="img" />

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

if (!id) {
  document.body.innerHTML = "Нет ID проекта";
} else {
  load();
}

async function load() {
  try {
    const { data, error } = await window.supabase
      .from('projects')
      .select('*')
      .eq('id', id)
      .single();

    if (error || !data) {
      document.body.innerHTML = "Проект не найден";
      return;
    }

    document.getElementById('title').innerText = data.title || 'Без названия';
    document.getElementById('desc').innerText = data.short_description || '';
    document.getElementById('img').src = data.cover_image || '';

  } catch (e) {
    document.body.innerHTML = "Ошибка загрузки";
    console.error(e);
  }
}
</script>

</body>
</html>
