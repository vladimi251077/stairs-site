<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Проект — Tekstura</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: #0f0c0a;
      color: #f4e7d4;
      font-family: Inter, Arial, sans-serif;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      padding: 10px 14px;
      color: #d7c3a8;
      background: rgba(255,255,255,.03);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.1;
    }
    .subtitle {
      margin: 0 0 20px;
      color: #b8aa98;
      font-size: 18px;
      line-height: 1.45;
    }
    .hero-image {
      width: 100%;
      height: 360px;
      object-fit: cover;
      border-radius: 20px;
      display: block;
      background: #201b18;
      margin-bottom: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 18px;
    }
    .card {
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 18px;
      background: rgba(255,255,255,.02);
      padding: 18px;
    }
