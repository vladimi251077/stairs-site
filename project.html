<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Проект — Tekstura</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase-config.js"></script>

<style>
  body {
    margin: 0;
    background: #0f0c0a;
    color: #f4e7d4;
    font-family: Inter, Arial, sans-serif;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
  }

  a {
    color: #e8c8a2;
    text-decoration: none;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 10px;
  }

  p {
    color: #b9aa97;
    line-height: 1.6;
  }

  img {
    width: 100%;
    border-radius: 14px;
    margin: 20px 0;
    background: #201b18;
    object-fit: cover;
    max-height: 520px;
  }

  .price {
    font-size: 20px;
    color: #f0d7b7;
    font-weight: bold;
    margin-top: 10px;
  }

  .meta {
    margin-top: 18px;
    padding: 18px;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 16px;
    background: rgba(255,255,255,.02);
  }

  .btn {
    display: inline-block;
    margin-top: 24px;
    padding: 14px 20px;
    border-radius: 12px;
    background: #e8c8a2;
    color: #1a120e;
    font-weight: 700;
    text-decoration: none;
  }
</style>
</head>

<body>
<div class="wrap">

  <a href="/projects.html">← Назад к проектам</a>

  <h1 id="title">Загрузка...</h1>
  <p id="subtitle"></p>

  <img id="image" src="/logo.jpg.png" alt="Проект">

  <div id="price" class="price"></div>

  <p id="description"></p>

  <div class="meta">
    <p id="materials"></p>
    <p id="type"></p>
    <p id="category"></p>
    <p id="leadTime"></p>
  </div>

  <a class="btn" href="/request.html">Оставить заявку</a>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  const client = window.supabase.createClient(
    window.SUPABASE_CONFIG.url,
    window.SUPABASE_CONFIG.anonKey
  );

  if (!id) {
    document.body.innerHTML = "❌ Открой проект через страницу проектов";
  } else {
    loadProject();
  }

  async function loadProject() {
    try {
      const { data, error } = await client
        .from('projects')
        .select('*')
        .eq('id', id)
        .single();

      if (error || !data) {
        document.body.innerHTML = "❌ Проект не найден";
        return;
      }

      document.getElementById('title').innerText =
        data.title || 'Без названия';

      document.getElementById('subtitle').innerText =
        data.short_description || '';

      document.getElementById('description').innerText =
        data.full_description || data.description || 'Описание пока не добавлено';

      document.getElementById('image').src =
        data.cover_image || data.image || '/logo.jpg.png';

      if (data.price) {
        document.getElementById('price').innerText = 'Цена: ' + data.price + ' ₽';
      } else if (data.price_from) {
        document.getElementById('price').innerText = 'Цена от: ' + data.price_from + ' ₽';
      } else {
        document.getElementById('price').innerText = 'Цена: по запросу';
      }

      document.getElementById('materials').innerText =
        data.materials ? 'Материалы: ' + data.materials : '';

      document.getElementById('type').innerText =
        data.staircase_type ? 'Тип: ' + data.staircase_type : '';

      document.getElementById('category').innerText =
        data.category ? 'Категория: ' + data.category : '';

      document.getElementById('leadTime').innerText =
        data.lead_time ? 'Срок: ' + data.lead_time : '';

    } catch (err) {
      console.error(err);
      document.body.innerHTML = "❌ Ошибка загрузки";
    }
  }
</script>

</body>
</html>
