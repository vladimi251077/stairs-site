<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Проект лестницы — Tekstura</title>
<meta name="description" content="Проект премиальной лестницы Tekstura: детали решения, материалы, конструкция и особенности реализации.">
<link rel="canonical" href="https://tekstura.shop/project.html">
<meta property="og:type" content="website"><meta property="og:site_name" content="Tekstura"><meta property="og:title" content="Проект лестницы — Tekstura"><meta property="og:description" content="Проект премиальной лестницы Tekstura: детали решения, материалы, конструкция и особенности реализации."><meta property="og:url" content="https://tekstura.shop/project.html">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/supabase-config.js"></script>
<style>
body{margin:0;background:#0f0c0a;color:#f4e7d4;font-family:Inter,Arial,sans-serif}.wrap{max-width:980px;margin:0 auto;padding:24px}a{color:#e8c8a2;text-decoration:none}h1{font-size:32px;margin-bottom:10px}p{color:#b9aa97;line-height:1.6}
.gallery-main{width:100%;border-radius:14px;margin:16px 0;background:#201b18;object-fit:cover;max-height:560px;cursor:pointer}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-bottom:16px}.thumbs img{width:100%;height:72px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,.15);cursor:pointer}.thumbs img.active{border-color:#e8c8a2}
.price{font-size:20px;color:#f0d7b7;font-weight:bold;margin-top:10px}.meta,.config{margin-top:18px;padding:18px;border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(255,255,255,.02)}
.btn{display:inline-block;margin-top:20px;padding:14px 20px;border-radius:12px;background:#e8c8a2;color:#1a120e;font-weight:700}.config-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.config select,.config input{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:#171310;color:#f4e7d4}.muted{font-size:13px;color:#ad9e8d}.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.86);display:none;align-items:center;justify-content:center}.lightbox.open{display:flex}.lightbox img{max-width:92vw;max-height:92vh;border-radius:12px}
@media(max-width:760px){.config-grid{grid-template-columns:1fr}}
</style></head><body><div class="wrap">
<a href="/projects.html">← Назад к проектам</a><h1 id="title">Загрузка...</h1><p id="subtitle"></p>
<img id="mainImage" class="gallery-main" src="/logo.jpg.png" alt="Проект"><div class="thumbs" id="thumbs"></div>
<div id="price" class="price"></div><p id="description"></p>
<div class="meta"><p id="materials"></p><p id="type"></p><p id="category"></p><p id="leadTime"></p></div>
<div class="config"><h3>Customize this project</h3><p class="muted">Быстрая оценка изменений по выбранному проекту. Это не полный инженерный расчёт.</p>
<div class="config-grid">
<div><label>Ограждение</label><select id="cfgRailing"></select></div>
<div><label>Облицовка</label><select id="cfgCladding"></select></div>
<div><label>Каркас</label><select id="cfgFrame"></select></div>
<div><label>Финиш</label><select id="cfgFinish"></select></div>
<div><label>Подсветка</label><select id="cfgLighting"><option value="0">Нет</option><option value="1">Да</option></select></div>
<div><label>Покраска/покрытие</label><select id="cfgCoating"><option value="0">Базовое</option><option value="1">Премиум</option></select></div>
</div>
<p id="cfgBase" class="muted"></p><p id="cfgDelta" class="muted"></p><p id="cfgTotal" class="price"></p>
<a id="cfgRequest" class="btn" href="/request.html">Отправить запрос по изменениям</a>
</div>
<a class="btn" href="/request.html">Оставить заявку</a></div>
<div id="lightbox" class="lightbox"><img id="lightboxImage" src="" alt="Просмотр"></div>
<script>
const params = new URLSearchParams(location.search); const id = params.get('id');
const client = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);
let project = null; let images = []; let basePrice = 0;
const defaults = {
  railing:[['none','Без ограждения',0],['metal','Металл',0],['glass','Стекло',38000],['wood','Дерево',21000]],
  cladding:[['none','Без облицовки',-30000],['standard','Стандарт',0],['premium','Премиум',52000]],
  frame:[['metal','Металл',0],['wood','Дерево',26000],['concrete','Бетон',42000]],
  finish:[['basic','Базовый',0],['standard','Стандарт',18000],['premium','Премиум',48000]]
};
function updateSeoMeta(t,d){const base='Проект лестницы — Tekstura';const ft=t?`${t} — проект лестницы | Tekstura`:base;const fd=d||'Проект премиальной лестницы Tekstura';document.title=ft;document.querySelector('meta[name="description"]').setAttribute('content',fd);document.querySelector('meta[property="og:title"]').setAttribute('content',ft);document.querySelector('meta[property="og:description"]').setAttribute('content',fd);}
if(!id) document.body.innerHTML='❌ Открой проект через страницу проектов'; else loadProject();
function setMainImage(url){const m=document.getElementById('mainImage');m.src=url||'/logo.jpg.png';document.querySelectorAll('#thumbs img').forEach((i)=>i.classList.toggle('active',i.src===m.src));}
function fillSelect(id,options){document.getElementById(id).innerHTML=options.map(o=>`<option value="${o[0]}" data-delta="${o[2]}">${o[1]}</option>`).join('');}
function recalc(){const picks=['cfgRailing','cfgCladding','cfgFrame','cfgFinish'].map((id)=>document.getElementById(id).selectedOptions[0]);const delta=picks.reduce((s,o)=>s+Number(o.dataset.delta||0),0)+Number(document.getElementById('cfgLighting').value)*26000+Number(document.getElementById('cfgCoating').value)*18000;const total=basePrice+delta;document.getElementById('cfgBase').textContent=`Базовая цена проекта: ${new Intl.NumberFormat('ru-RU').format(basePrice)} ₽`;document.getElementById('cfgDelta').textContent=`Изменения: ${delta>=0?'+':''}${new Intl.NumberFormat('ru-RU').format(delta)} ₽`;document.getElementById('cfgTotal').textContent=`Оценка с изменениями: ${new Intl.NumberFormat('ru-RU').format(total)} ₽`;
const payload={staircaseType:project?.title||'Проект',total,selectedExtras:[...picks.map((o)=>({label:o.textContent})),{label:Number(document.getElementById('cfgLighting').value)?'Подсветка':'Без подсветки'},{label:Number(document.getElementById('cfgCoating').value)?'Премиум покрытие':'Базовое покрытие'}],materialsSummary:{railing:picks[0].textContent,cladding:picks[1].textContent,frame:picks[2].textContent,finish:picks[3].textContent},priceBreakdown:{base:basePrice,delta},dimensions:{project_id:project?.id,project_title:project?.title}};
document.getElementById('cfgRequest').href='/request.html?calc='+encodeURIComponent(JSON.stringify(payload));}
async function loadProject(){try{const {data,error}=await client.from('projects').select('*').eq('id',id).single();if(error||!data){document.body.innerHTML='❌ Проект не найден';return;}project=data;basePrice=Number(data.price||data.price_from||0)||0;
const {data:imgData}=await client.from('project_images').select('*').eq('project_id',id).order('sort_order',{ascending:true});
images=(imgData&&imgData.length)?imgData:[{image_url:data.cover_image||data.image||'/logo.jpg.png',alt_text:data.title||'Проект',is_cover:true}];
const cover=images.find(i=>i.is_cover)?.image_url||images[0].image_url; setMainImage(cover);
document.getElementById('thumbs').innerHTML=images.map((img)=>`<img src="${img.image_url}" alt="${img.alt_text||'Проект'}">`).join('');document.querySelectorAll('#thumbs img').forEach((img)=>img.onclick=()=>setMainImage(img.src));

const opts=data.custom_options || {}; fillSelect('cfgRailing',opts.railing||defaults.railing); fillSelect('cfgCladding',opts.cladding||defaults.cladding); fillSelect('cfgFrame',opts.frame||defaults.frame); fillSelect('cfgFinish',opts.finish||defaults.finish);
['cfgRailing','cfgCladding','cfgFrame','cfgFinish','cfgLighting','cfgCoating'].forEach((id)=>document.getElementById(id).addEventListener('change',recalc)); recalc();

document.getElementById('title').innerText=data.title||'Без названия';document.getElementById('subtitle').innerText=data.short_description||'';document.getElementById('description').innerText=data.full_description||data.description||'Описание пока не добавлено';
document.getElementById('price').innerText=basePrice?('Цена: '+new Intl.NumberFormat('ru-RU').format(basePrice)+' ₽'):'Цена: по запросу';
document.getElementById('materials').innerText=data.materials?'Материалы: '+data.materials:'';document.getElementById('type').innerText=data.staircase_type?'Тип: '+data.staircase_type:'';document.getElementById('category').innerText=data.category?'Категория: '+data.category:'';document.getElementById('leadTime').innerText=data.lead_time?'Срок: '+data.lead_time:'';
updateSeoMeta(data.title,data.short_description||data.description||data.full_description||'');
}catch(err){console.error(err);document.body.innerHTML='❌ Ошибка загрузки';}}

const lb=document.getElementById('lightbox');const lbi=document.getElementById('lightboxImage');document.getElementById('mainImage').addEventListener('click',()=>{lbi.src=document.getElementById('mainImage').src;lb.classList.add('open');});lb.addEventListener('click',()=>lb.classList.remove('open'));
</script></body></html>
