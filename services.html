<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Услуги по проектированию и изготовлению лестниц — Tekstura</title>
  <meta name="description" content="Проектирование, изготовление и монтаж премиальных лестниц. Полное сопровождение проекта, подбор материалов и инженерный расчёт.">
  <link rel="canonical" href="https://tekstura.shop/services.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Tekstura">
  <meta property="og:title" content="Услуги по проектированию и изготовлению лестниц — Tekstura">
  <meta property="og:description" content="Проектирование, изготовление и монтаж премиальных лестниц. Полное сопровождение проекта, подбор материалов и инженерный расчёт.">
  <meta property="og:url" content="https://tekstura.shop/services.html">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <link rel="stylesheet" href="/styles.css">
  <style>.wrap{max-width:1100px;margin:0 auto;padding:24px 16px 48px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}.card{border:1px solid rgba(255,255,255,.11);border-radius:14px;padding:16px;background:rgba(255,255,255,.02)}.price{color:#efd8bb;font-weight:700;margin-top:10px}@media(max-width:760px){.wrap{padding:16px}}</style>
</head>
<body>
  <main class="wrap">
    <h1>Услуги Tekstura</h1>
    <p class="subtitle">Полный цикл работ: от идеи и инженерии до монтажа на объекте.</p>
    <p class="subtitle">Производство: Казань, Орнбургский тракт, 340.</p>
    <div id="servicesStatus" class="subtitle" aria-live="polite"></div>
    <section id="servicesRoot" class="grid"></section>
  </main>
<script>
const fallback=[
  {title:'Проектирование',description:'Инженерный расчёт, подбор геометрии, материалов и визуальная концепция лестницы.',price:'от 35 000 ₽'},
  {title:'Изготовление',description:'Производство каркаса, ступеней и ограждений под размеры вашего объекта.',price:'от 220 000 ₽'},
  {title:'Монтаж',description:'Профессиональная установка и финальная подгонка на объекте.',price:'от 70 000 ₽'}
];
const root=document.getElementById('servicesRoot');
const status=document.getElementById('servicesStatus');
const esc=(s='')=>String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
function render(items){root.innerHTML=(items||[]).map((s)=>`<article class="card"><h2>${esc(s.title||'Услуга')}</h2><p>${esc(s.description||'')}</p><div class="price">${esc(s.price||'по запросу')}</div></article>`).join('');}
(async function load(){
  try {
    const cfg = window.SUPABASE_CONFIG;
    const client=(cfg?.url && cfg?.anonKey && window.supabase) ? window.supabase.createClient(cfg.url, cfg.anonKey) : null;
    if(!client){
      status.textContent='Показываем базовый набор услуг.';
      render(fallback);
      return;
    }
    const {data,error}=await client.from('services').select('*').order('sort_order',{ascending:true});
    if(error) throw error;
    const prepared=(data||[]).map((item)=>({title:item.title,description:item.description,price:item.price_from?`от ${item.price_from} ₽`:(item.price||'по запросу')}));
    status.textContent = prepared.length ? '' : 'Актуальные позиции скоро появятся. Ниже — базовые услуги.';
    render(prepared.length?prepared:fallback);
  } catch (e) {
    console.error(e);
    status.textContent='Список услуг временно недоступен. Ниже — базовые услуги.';
    render(fallback);
  }
})();
</script>
</body>
</html>
