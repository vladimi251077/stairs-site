<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Оставить заявку на лестницу — Tekstura</title>
  <meta name="description" content="Оставьте заявку на лестницу Tekstura. Если расчёт выполнен в калькуляторе, мы подтянем его параметры в форму автоматически.">
  <link rel="canonical" href="https://tekstura.shop/request.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Tekstura">
  <meta property="og:title" content="Оставить заявку на лестницу — Tekstura">
  <meta property="og:description" content="Передайте расчёт из калькулятора и отправьте заявку в Tekstura.">
  <meta property="og:url" content="https://tekstura.shop/request.html">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <style>
    :root{--bg:#0f0c0a;--panel:#19130f;--line:#3d332b;--text:#f4e7d4;--muted:#baa894;--accent:#e8c8a2;--ok:#9ddcb0;--err:#ff9e9e}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 Inter,sans-serif}
    .wrap{max-width:760px;margin:auto;padding:16px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
    h1{margin:0 0 8px;font-size:clamp(28px,4vw,38px)} .muted{color:var(--muted)} .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .full{grid-column:1/-1} input,textarea{width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);background:#120f0d;color:var(--text)} textarea{min-height:96px}
    .btn{width:100%;padding:12px;border-radius:10px;border:0;background:var(--accent);color:#1a120e;font-weight:700;cursor:pointer;margin-top:10px}
    .result{white-space:pre-line;background:#221a15;border:1px solid var(--line);border-radius:10px;padding:10px}
    #status.ok{color:var(--ok)} #status.err{color:var(--err)}
    @media(max-width:700px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Заявка на лестницу</h1>
    <p class="muted">Заполните контакты — мы свяжемся и уточним детали проекта.</p>
    <p class="muted">Производство Tekstura: Казань, Орнбургский тракт, 340.</p>

    <div class="panel">
      <b>Сводка расчёта</b>
      <div id="calcData" class="result">Расчёт не передан. Вы можете оставить заявку без калькулятора.</div>
    </div>

    <div class="panel">
      <div class="grid">
        <div><input id="name" placeholder="Имя"></div>
        <div><input id="phone" placeholder="Телефон *"></div>
        <div><input id="messenger" placeholder="WhatsApp / Telegram"></div>
        <div><input id="city" placeholder="Город"></div>
        <div class="full"><textarea id="comment" placeholder="Комментарий"></textarea></div>
      </div>
      <button class="btn" id="sendBtn" onclick="sendRequest()">Отправить заявку</button>
      <div id="status" style="margin-top:10px"></div>
    </div>
  </div>
<script>
const cfg = window.SUPABASE_CONFIG;
const client = (cfg?.url && cfg?.anonKey && window.supabase)
  ? window.supabase.createClient(cfg.url, cfg.anonKey)
  : null;
let calcPayload = null;

function parseCalc(){
  const queryRaw = new URLSearchParams(location.search).get('calc');
  const sessionRaw = sessionStorage.getItem('tekstura_calc_payload');
  const raw = queryRaw || sessionRaw;
  if (!raw) return;
  try {
    calcPayload = JSON.parse(decodeURIComponent(raw));
    if (queryRaw) {
      sessionStorage.setItem('tekstura_calc_payload', queryRaw);
    }
    const lines = [
      `Тип лестницы: ${calcPayload.staircaseType || '-'}`,
      `Каркас: ${calcPayload?.materialsSummary?.frame || '-'}`,
      `Облицовка: ${calcPayload?.materialsSummary?.cladding || '-'}`,
      `Ограждение: ${calcPayload?.materialsSummary?.railing || '-'}`,
      `Опции: ${(calcPayload?.selectedExtras || []).map((i)=>i.label).join(', ') || 'Нет'}`,
      `Итоговая стоимость: ${Number(calcPayload.total || 0).toLocaleString('ru-RU')} ₽`
    ];
    document.getElementById('calcData').textContent = lines.join('\n');
  } catch (err) {
    console.error('calc parse error', err);
    document.getElementById('calcData').textContent = 'Не удалось прочитать расчёт. Вы можете отправить заявку вручную.';
  }
}

async function insertLead(payload){
  if (!client) throw new Error('Supabase не настроен');
  const tables = ['leads', 'calculator_requests'];
  let lastError = null;
  for (const table of tables) {
    const { data, error } = await client.from(table).insert([payload]).select('*').single();
    if (!error) return { data, table };
    lastError = error;
  }
  throw lastError;
}

async function sendRequest() {
  const status = document.getElementById('status');
  const sendBtn = document.getElementById('sendBtn');
  status.className = '';
  status.textContent = 'Отправляем заявку...';
  sendBtn.disabled = true;
  const phone = document.getElementById('phone').value.trim();
  if (!phone) {
    status.className = 'err';
    status.textContent = 'Введите телефон для отправки заявки.';
    sendBtn.disabled = false;
    return;
  }

  const payload = {
    name: document.getElementById('name').value.trim(),
    phone,
    messenger: document.getElementById('messenger').value.trim(),
    city: document.getElementById('city').value.trim(),
    comment: document.getElementById('comment').value.trim(),
    staircase_type: calcPayload?.staircaseType || '',
    dimensions_json: calcPayload?.dimensions || {},
    materials_json: calcPayload?.materialsSummary || {},
    options_json: { selected: calcPayload?.selectedExtras || [], price_breakdown: calcPayload?.priceBreakdown || {} },
    calculated_price: Number(calcPayload?.total || 0)
  };

  try {
    const { data } = await insertLead(payload);
    status.className = 'ok';
    status.textContent = 'Заявка отправлена ✅ Спасибо! Мы свяжемся с вами в ближайшее время.';
    document.getElementById('sendBtn').disabled = true;
    try {
      await fetch('/api/notify-lead', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lead: data || payload }) });
    } catch (err) { console.error('notify failed', err); }
  } catch (error) {
    console.error(error);
    status.className = 'err';
    status.textContent = `Ошибка отправки: ${error?.message || 'Не удалось записать заявку в Supabase'}`;
    sendBtn.disabled = false;
  }
}

parseCalc();
</script>
</body>
</html>
