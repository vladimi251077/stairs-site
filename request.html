<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Заявка — Tekstura</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f0c0a;
      color: #f4e7d4;
      font-family: Inter, sans-serif;
    }

    .wrap {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .block {
      background: #1a1410;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      background: #2a211b;
      color: #fff;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #e8c8a2;
      font-weight: bold;
    }

    .result {
      background: #2a211b;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <h1>Заявка</h1>

    <div class="block">
      <b>Ваш расчет:</b>
      <div id="calcData" class="result">Нет данных</div>
    </div>

    <div class="block">
      <input id="name" placeholder="Имя">
      <input id="phone" placeholder="Телефон">
      <input id="messenger" placeholder="WhatsApp / Telegram">
      <input id="city" placeholder="Город">
      <textarea id="comment" placeholder="Комментарий"></textarea>

      <button onclick="sendRequest()">Отправить заявку</button>
    </div>

    <div id="status"></div>

  </div>

<script>
const client = window.supabase.createClient(
  window.SUPABASE_CONFIG.url,
  window.SUPABASE_CONFIG.anonKey
);

let calcPayload = null;
const CALC_STORAGE_KEY = 'tekstura_stair_calc_payload';

function money(value) {
  return `${new Intl.NumberFormat('ru-RU').format(Math.round(value || 0))} ₽`;
}

function mm(value) {
  return `${new Intl.NumberFormat('ru-RU').format(Math.round(value || 0))} мм`;
}

function statusLabel(status) {
  if (status === 'recommended') return 'рекомендуемая';
  if (status === 'warning') return 'нужна проверка';
  if (status === 'invalid') return 'инженерная проверка';
  return 'не указан';
}

function parsePayload(raw, isEncoded = false) {
  if (!raw) return null;
  try {
    return JSON.parse(isEncoded ? decodeURIComponent(raw) : raw);
  } catch (error) {
    console.error(error);
    return null;
  }
}

function renderCalcSummary(payload) {
  if (!payload) return 'Нет данных';

  const dimensions = payload.input_dimensions || payload.dimensions || {};
  const geometry = payload.chosen_geometry_result || payload.geometryResult || {};
  const summaryRows = Array.isArray(geometry.summary_rows)
    ? geometry.summary_rows.map((row) => `${row[0]}: ${row[1]}`).join('\n')
    : '';
  const requestMode =
    payload.request_mode === 'engineer_review'
      ? 'Инженерная проверка'
      : 'Заявка по расчёту';
  const hasOpeningDimensions =
    dimensions.floor_to_floor_height ||
    dimensions.floorHeight ||
    dimensions.opening_length ||
    dimensions.openingLength;
  const geometryLines = geometry.riser_height
    ? `Подступенок: ${mm(geometry.riser_height)}
Проступь: ${mm(geometry.tread_depth)}
Просвет: ${geometry.headroom_min ? mm(geometry.headroom_min) : 'нужно уточнить'}`
    : '';

  return `${requestMode}
Сценарий: ${payload.baseCondition || payload.base_condition || 'не указан'}
Тип: ${payload.staircaseType || payload.selected_staircase_type || 'не указан'}
Статус: ${statusLabel(payload.status)}
${hasOpeningDimensions ? `Высота: ${mm(dimensions.floor_to_floor_height || dimensions.floorHeight)}
Проём: ${mm(dimensions.opening_length || dimensions.openingLength)} × ${mm(dimensions.opening_width || dimensions.openingWidth)}
Марш: ${mm(dimensions.march_width || dimensions.marchWidth)}` : summaryRows}
${geometryLines}
Ориентир: ${payload.total ? money(payload.total) : 'после проверки'}`;
}

// Получаем данные из URL
function loadCalcData() {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('calc');
  const stored = window.localStorage?.getItem(CALC_STORAGE_KEY);

  calcPayload = parsePayload(raw, true) || parsePayload(stored);
  if (calcPayload) {
    document.getElementById('calcData').innerText = renderCalcSummary(calcPayload);
  }
}

async function sendRequest() {
  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;
  const messenger = document.getElementById('messenger').value;
  const city = document.getElementById('city').value;
  const comment = document.getElementById('comment').value;

  if (!phone) {
    alert('Введите телефон');
    return;
  }

  const { error } = await client.from('calculator_requests').insert([
    {
      name,
      phone,
      messenger,
      city,
      comment,
      staircase_type: calcPayload?.selected_staircase_type || calcPayload?.staircaseType || '',
      dimensions_json: {
        ...(calcPayload?.input_dimensions || calcPayload?.dimensions || {}),
        status: calcPayload?.status || null,
        base_condition: calcPayload?.base_condition || null,
        warnings: calcPayload?.warnings || [],
        chosen_geometry_result: calcPayload?.chosen_geometry_result || calcPayload?.geometryResult || null,
        scenario_details: calcPayload?.scenario_details || {}
      },
      materials_json: calcPayload?.materials || {},
      options_json: calcPayload?.price_relevant_selections || calcPayload?.options || [],
      calculated_price: calcPayload?.total || 0
    }
  ]);

  if (error) {
    console.error(error);
    document.getElementById('status').innerText = 'Ошибка отправки';
  } else {
    document.getElementById('status').innerText = 'Заявка отправлена ✅';
  }
}

loadCalcData();
</script>

</body>
</html>
