<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>SEO статистика — Tekstura Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <style>
    :root{--bg:#12100f;--panel:#1f1b18;--line:#3c342d;--text:#f4e7d4;--muted:#b9aa97;--accent:#e8c8a2;--good:#7bdc9d;--warn:#ffcf7a;--danger:#ff8d8d}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 Inter,Arial,sans-serif}.wrap{max-width:1220px;margin:0 auto;padding:22px}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:16px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px}h1,h2{margin:0 0 12px}h1{font-size:28px}h2{font-size:20px}.muted{color:var(--muted)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{background:var(--accent);color:#1b130f;border:0;padding:10px 14px;border-radius:10px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex}.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--line)}.hidden{display:none!important}.status{margin-top:10px;color:var(--muted);white-space:pre-wrap}.status.error{color:var(--danger)}.status.success{color:var(--good)}input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#120f0d;color:var(--text)}label{display:block;font-weight:700;margin-bottom:6px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.card{border:1px solid var(--line);border-radius:14px;padding:14px;background:#171310}.metric{font-size:28px;font-weight:800}.small{font-size:13px;color:var(--muted)}.filters{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin-bottom:12px}table{width:100%;border-collapse:collapse}th,td{padding:10px 9px;border-bottom:1px solid var(--line);vertical-align:top}th{text-align:left;color:var(--muted);font-size:13px;font-weight:700}td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:2px 8px;font-size:12px;color:var(--muted)}.pill.good{border-color:var(--good);color:var(--good)}.pill.warn{border-color:var(--warn);color:var(--warn)}.pill.bad{border-color:var(--danger);color:var(--danger)}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{border:1px solid var(--line);background:#171310;color:var(--text);border-radius:999px;padding:7px 11px;cursor:pointer}.tab.active{background:var(--accent);color:#1b130f;border-color:var(--accent);font-weight:800}.table-wrap{overflow:auto}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.empty{border:1px dashed var(--line);border-radius:12px;padding:14px;text-align:center;color:var(--muted)}@media(max-width:820px){.topbar{flex-direction:column}.grid{grid-template-columns:1fr 1fr}.filters{grid-template-columns:1fr}th,td{white-space:nowrap}.query-cell{white-space:normal;min-width:240px}}@media(max-width:520px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>SEO статистика Tekstura</h1>
        <p class="muted">Автозагрузка из Яндекс Вебмастера: запросы, показы, клики и позиции.</p>
      </div>
      <div class="row">
        <a class="btn btn-secondary" href="/admin/">← В админку</a>
        <button id="logoutBtn" class="btn btn-secondary hidden">Выйти</button>
      </div>
    </div>

    <section id="authBox" class="panel">
      <h2>Вход</h2>
      <div class="filters">
        <div><label for="email">Email</label><input id="email" type="email" placeholder="admin@mail.com"></div>
        <div><label for="password">Пароль</label><input id="password" type="password" placeholder="••••••••"></div>
        <div style="align-self:end"><button id="loginBtn" class="btn">Войти</button></div>
      </div>
      <div id="authStatus" class="status">Войдите в админку, чтобы смотреть SEO данные.</div>
    </section>

    <section id="app" class="hidden">
      <section class="panel">
        <div class="row" style="justify-content:space-between;margin-bottom:12px">
          <div>
            <h2>Сводка</h2>
            <div id="lastUpdate" class="small">Загрузка…</div>
          </div>
          <div class="row">
            <button id="refreshBtn" class="btn btn-secondary">Обновить экран</button>
            <button id="syncBtn" class="btn">Синхронизировать сейчас</button>
          </div>
        </div>
        <div class="grid">
          <div class="card"><div class="small">Показы</div><div id="mShows" class="metric">0</div></div>
          <div class="card"><div class="small">Клики</div><div id="mClicks" class="metric">0</div></div>
          <div class="card"><div class="small">CTR</div><div id="mCtr" class="metric">0%</div></div>
          <div class="card"><div class="small">Средняя позиция</div><div id="mPos" class="metric">—</div></div>
        </div>
        <div id="mainStatus" class="status"></div>
      </section>

      <section class="panel">
        <h2>Запросы</h2>
        <div class="tabs">
          <button class="tab active" data-mode="tracked">Группа “Деревянные лестницы Казань”</button>
          <button class="tab" data-mode="all">Все найденные</button>
          <button class="tab" data-mode="untracked">Новые / неотслеживаемые</button>
          <button class="tab" data-mode="runs">История синхронизации</button>
        </div>
        <div class="filters" id="filtersBox">
          <input id="searchInput" placeholder="Поиск по запросу…" />
          <select id="groupFilter" style="padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#120f0d;color:var(--text)"><option value="">Все группы</option></select>
          <select id="problemFilter" style="padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#120f0d;color:var(--text)"><option value="">Все</option><option value="zero">Без показов</option><option value="noclicks">Есть показы, нет кликов</option><option value="top30">Позиция до 30</option></select>
        </div>
        <div id="tableBox" class="table-wrap"></div>
      </section>
    </section>
  </div>

  <script>
    const cfg = window.SUPABASE_CONFIG;
    const authBox = document.getElementById('authBox');
    const app = document.getElementById('app');
    const authStatus = document.getElementById('authStatus');
    const logoutBtn = document.getElementById('logoutBtn');
    const mainStatus = document.getElementById('mainStatus');
    const tableBox = document.getElementById('tableBox');
    const filtersBox = document.getElementById('filtersBox');
    let client = null;
    let state = { mode:'tracked', data:null };

    function setAuthStatus(text, error=false){authStatus.textContent=text;authStatus.classList.toggle('error',error)}
    function setMainStatus(text, type=''){mainStatus.textContent=text||'';mainStatus.className='status '+type}
    function fmt(n){return Number(n||0).toLocaleString('ru-RU')}
    function pct(n){return `${Number(n||0).toLocaleString('ru-RU')}%`}
    function pos(n){return n===null||n===undefined?'—':Number(n).toLocaleString('ru-RU')}
    function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

    if (!cfg || !cfg.url || !cfg.anonKey) {
      setAuthStatus('Ошибка: не загрузился supabase-config.js', true);
    } else {
      client = window.supabase.createClient(cfg.url, cfg.anonKey);
      init();
    }

    async function init(){
      document.getElementById('loginBtn').onclick = login;
      document.getElementById('logoutBtn').onclick = logout;
      document.getElementById('refreshBtn').onclick = loadData;
      document.getElementById('syncBtn').onclick = syncNow;
      document.getElementById('searchInput').oninput = renderTable;
      document.getElementById('groupFilter').onchange = renderTable;
      document.getElementById('problemFilter').onchange = renderTable;
      document.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.mode=btn.dataset.mode;renderTable();});
      const { data } = await client.auth.getSession();
      if (data.session) showApp(); else showAuth();
    }

    async function login(){
      const email=document.getElementById('email').value.trim();
      const password=document.getElementById('password').value;
      const { error } = await client.auth.signInWithPassword({ email, password });
      if(error){setAuthStatus(error.message,true);return}
      showApp();
    }
    async function logout(){await client.auth.signOut();showAuth()}
    function showAuth(){authBox.classList.remove('hidden');app.classList.add('hidden');logoutBtn.classList.add('hidden')}
    function showApp(){authBox.classList.add('hidden');app.classList.remove('hidden');logoutBtn.classList.remove('hidden');loadData()}

    async function getToken(){const { data }=await client.auth.getSession();return data.session?.access_token||''}
    async function loadData(){
      try{
        setMainStatus('Загружаю данные…');
        const token=await getToken();
        const res=await fetch('/admin/api/seo-data',{headers:{authorization:`Bearer ${token}`}});
        const data=await res.json();
        if(!res.ok||!data.ok) throw new Error(data.error||'Ошибка загрузки');
        state.data=data;
        renderSummary(data);
        fillGroups(data.trackedRows||[]);
        renderTable();
        setMainStatus('Данные загружены.','success');
      }catch(e){setMainStatus(e.message,'error')}
    }
    async function syncNow(){
      try{
        setMainStatus('Запускаю синхронизацию с Яндекс Вебмастером…');
        const res=await fetch('/admin/api/seo-sync');
        const data=await res.json();
        if(!res.ok||!data.ok) throw new Error(data.error||'Ошибка синхронизации');
        setMainStatus(`Синхронизация готова: импортировано ${data.imported} строк.`, 'success');
        await loadData();
      }catch(e){setMainStatus(e.message,'error')}
    }
    function renderSummary(data){
      document.getElementById('mShows').textContent=fmt(data.summary?.shows);
      document.getElementById('mClicks').textContent=fmt(data.summary?.clicks);
      document.getElementById('mCtr').textContent=pct(data.summary?.ctr);
      document.getElementById('mPos').textContent=pos(data.summary?.avgPosition);
      const run=(data.runs||[])[0];
      document.getElementById('lastUpdate').textContent=run?`Последняя синхронизация: ${new Date(run.started_at).toLocaleString('ru-RU')} · ${run.status} · ${run.message||''}`:'Синхронизаций пока нет';
    }
    function fillGroups(rows){
      const select=document.getElementById('groupFilter');
      const current=select.value;
      const groups=[...new Set(rows.map(r=>r.group_name).filter(Boolean))];
      select.innerHTML='<option value="">Все группы</option>'+groups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('');
      select.value=current;
    }
    function filteredRows(rows){
      const q=document.getElementById('searchInput').value.trim().toLowerCase();
      const group=document.getElementById('groupFilter').value;
      const problem=document.getElementById('problemFilter').value;
      return rows.filter(r=>{
        const query=String(r.query||'').toLowerCase();
        if(q && !query.includes(q)) return false;
        if(group && r.group_name!==group) return false;
        if(problem==='zero' && Number(r.shows||0)!==0) return false;
        if(problem==='noclicks' && !(Number(r.shows||0)>0 && Number(r.clicks||0)===0)) return false;
        if(problem==='top30' && !(Number(r.avg_show_position||999)<=30)) return false;
        return true;
      });
    }
    function statusPill(row){
      if(Number(row.shows||0)===0) return '<span class="pill">нет показов</span>';
      if(Number(row.clicks||0)===0) return '<span class="pill warn">есть показы, нет кликов</span>';
      return '<span class="pill good">есть клики</span>';
    }
    function renderTable(){
      const data=state.data;
      if(!data){tableBox.innerHTML='<div class="empty">Данных пока нет</div>';return}
      filtersBox.classList.toggle('hidden', state.mode==='runs');
      if(state.mode==='runs') return renderRuns(data.runs||[]);
      const source = state.mode==='tracked' ? (data.trackedRows||[]) : state.mode==='untracked' ? (data.untrackedRows||[]) : (data.latestRows||[]);
      const rows = filteredRows(source);
      if(!rows.length){tableBox.innerHTML='<div class="empty">Нет строк для выбранного фильтра</div>';return}
      tableBox.innerHTML=`<table><thead><tr><th>Запрос</th><th>Группа</th><th class="num">Показы</th><th class="num">Клики</th><th class="num">CTR</th><th class="num">Позиция</th><th>Статус</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="query-cell">${esc(r.query)}</td><td>${esc(r.group_name||'—')}</td><td class="num">${fmt(r.shows)}</td><td class="num">${fmt(r.clicks)}</td><td class="num">${pct(r.ctr)}</td><td class="num">${pos(r.avg_show_position)}</td><td>${statusPill(r)}</td></tr>`).join('')}</tbody></table>`;
    }
    function renderRuns(rows){
      if(!rows.length){tableBox.innerHTML='<div class="empty">Синхронизаций пока нет</div>';return}
      tableBox.innerHTML=`<table><thead><tr><th>Дата</th><th>Период</th><th>Статус</th><th class="num">Строк</th><th>Сообщение</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${new Date(r.started_at).toLocaleString('ru-RU')}</td><td class="mono">${esc(r.period_start)} — ${esc(r.period_end)}</td><td>${esc(r.status)}</td><td class="num">${fmt(r.rows_imported)}</td><td>${esc(r.message||'')}</td></tr>`).join('')}</tbody></table>`;
    }
  </script>
</body>
</html>
