<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tekstura Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #1f1b18;
            --panel: #1f1b18;
            --line: #3c342d;
            --text: #f4e74d;
            --muted: #b9aa97;
            --accent: #e8c82a;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            padding: 24px;
            font-size: 28px;
            color: var(--muted);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        label {
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
        }
        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            color: var(--text);
        }
        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--text);
        }
        .hero-card {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <section class="panel">
        <h2>Проекты</h2>
        <div id="projectsList"></div>
        <div class="row">
            <button id="addProject" class="btn btn-secondary">Добавить проект</button>
            <button id="saveProjects" class="btn btn-secondary">Сохранить проект</button>
        </div>
    </section>

    <p id="status" class="status"></p>

    <script>
        const SUPABASE_URL = 'https://rhnlykqqhweaywjopvm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_OeUkZnLVZ1lTHcS19zau5Q_h_aJguli'; // Обновите с правильным ключом
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const authBox = document.getElementById('authBox');
        const adminApp = document.getElementById('adminApp');
        const authStatus = document.getElementById('authStatus');
        const statusBox = document.getElementById('status');
        const logoutBtn = document.getElementById('logoutBtn');

        const state = { heroImage: '', logo: '', services: [], projects: [] };

        function note(msg) { statusBox.textContent = msg; }

        function uid() {
            return crypto.randomUUID() + Date.now();
        }

        async function uploadFile(file, folder) {
            if (!file) return '';
            const path = `${folder}/${Date.now()}-${file.name.replace(/\s+/g, '-')}`;
            const { error } = await client.storage.from('site-assets').upload(path, file);
            if (error) throw error;
        }

        async function fetchProjects() {
            try {
                const { data: projects, error } = await client
                    .from('projects')
                    .select('*');

                if (error) throw error;

                projects.forEach(project => {
                    const projectElement = document.createElement('div');
                    projectElement.className = 'project';
                    projectElement.textContent = project.title;
                    projectsList.appendChild(projectElement);
                });
            } catch (err) {
                note(`Error fetching projects: ${err.message}`);
            }
        }

        // Add other code for saving and handling projects

        fetchProjects();
    </script>
</body>
</html>
