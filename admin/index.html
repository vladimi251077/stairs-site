<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tekstura Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <style>
    :root{
      --bg:#12100f;
      --panel:#1f1b18;
      --line:#3c342d;
      --text:#f4e7d4;
      --muted:#b9aa97;
      --accent:#e8c8a2;
      --danger:#ff8d8d;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font:15px/1.45 Inter, Arial, sans-serif;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:24px;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      margin-bottom:16px;
    }
    h1,h2{margin:0 0 14px}
    h1{font-size:28px}
    h2{font-size:20px}
    .muted{color:var(--muted)}
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .full{grid-column:1/-1}
    label{
      font-weight:700;
      display:block;
      margin-bottom:6px;
    }
    input,textarea,button{
      font:inherit;
    }
    input,textarea{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#120f0d;
      color:var(--text);
    }
    textarea{
      min-height:86px;
      resize:vertical;
    }
    .btn{
      background:var(--accent);
      color:#1b130f;
      border:0;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }
    .btn-secondary{
      background:transparent;
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn-danger{
      background:transparent;
      color:var(--danger);
      border:1px solid var(--danger);
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .item{
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      margin-bottom:10px;
    }
    .hidden{display:none !important}
    .status{
      margin-top:10px;
      color:var(--muted);
      white-space:pre-wrap;
    }
    .status.success{color:#7bdc9d}
    .status.warning{color:#ffcf7a}
    .status.error{color:var(--danger)}
    .preview{
      display:block;
      max-width:220px;
      max-height:120px;
      border-radius:8px;
      border:1px solid var(--line);
      object-fit:cover;
      margin-top:8px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
    }
    .small{
      font-size:13px;
      color:var(--muted);
    }
    .gallery-tools{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      margin-bottom:10px;
    }
    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:10px;
    }
    .gallery-card{
      border:1px solid var(--line);
      border-radius:12px;
      background:#171310;
      padding:10px;
    }
    .gallery-card img{
      width:100%;
      height:130px;
      border-radius:8px;
      border:1px solid var(--line);
      object-fit:cover;
      display:block;
      margin-bottom:8px;
    }
    .cover-badge{
      display:inline-flex;
      border:1px solid var(--accent);
      color:var(--accent);
      border-radius:999px;
      padding:2px 8px;
      font-size:12px;
      margin-bottom:8px;
    }
    .gallery-meta{
      display:grid;
      grid-template-columns:1fr 92px;
      gap:8px;
      margin-bottom:8px;
    }
    .gallery-actions{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .gallery-empty{
      border:1px dashed var(--line);
      border-radius:10px;
      padding:12px;
      color:var(--muted);
      text-align:center;
    }
    details.advanced{
      margin-top:10px;
    }
    details.advanced > summary{
      cursor:pointer;
      color:var(--muted);
      user-select:none;
      margin-bottom:8px;
    }
    @media (max-width:760px){
      .grid{grid-template-columns:1fr}
      .topbar{align-items:flex-start;flex-direction:column}
      .gallery-meta{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Админ-панель Tekstura</h1>
        <p class="muted">Авторизация через Supabase Auth. Данные и изображения сохраняются в Supabase.</p>
      </div>
      <div class="row">
        <button id="logoutBtn" class="btn btn-secondary hidden">Выйти</button>
      </div>
    </div>

    <section id="authBox" class="panel">
      <h2>Вход</h2>
      <div class="grid">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="admin@mail.com" />
        </div>
        <div>
          <label for="password">Пароль</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>
      </div>
      <div class="row" style="margin-top:12px">
        <button id="loginBtn" class="btn">Войти</button>
      </div>
      <div id="authStatus" class="status">Выполните вход для доступа к управлению контентом.</div>
    </section>

    <section id="adminApp" class="hidden">
      <section class="panel">
        <h2>Контакты</h2>
        <div class="grid">
          <div>
            <label for="phone">Телефон</label>
            <input id="phone" />
          </div>
          <div>
            <label for="whatsapp">WhatsApp</label>
            <input id="whatsapp" />
          </div>
          <div>
            <label for="telegram">Telegram</label>
            <input id="telegram" />
          </div>
          <div>
            <label for="notifyEmail">Email для уведомлений</label>
            <input id="notifyEmail" type="email" placeholder="leads@tekstura.shop" />
          </div>
          <div>
            <label for="max">MAX</label>
            <input id="max" />
          </div>
        </div>
        <div class="row" style="margin-top:12px">
          <button id="saveContacts" class="btn">Сохранить контакты</button>
        </div>
        <div id="contactsStatus" class="status small" aria-live="polite"></div>
        <div id="effectiveNotifyEmail" class="status small" aria-live="polite"></div>
      </section>

      <section class="panel">
        <h2>Главный экран</h2>
        <div class="grid">
          <div class="full">
            <label for="heroTitle">Заголовок</label>
            <input id="heroTitle" />
          </div>
          <div class="full">
            <label for="heroSubtitle">Подзаголовок</label>
            <textarea id="heroSubtitle"></textarea>
          </div>
          <div>
            <label for="badge">Badge</label>
            <input id="badge" />
          </div>
          <div>
            <label for="baseRate">Базовая цена</label>
            <input id="baseRate" type="number" min="1" />
          </div>

          <div>
            <label for="heroImageFile">Hero image</label>
            <input id="heroImageFile" type="file" accept="image/*" />
            <input id="heroImage" type="text" placeholder="URL картинки hero" />
            <img id="heroImagePreview" class="preview hidden" alt="hero preview" />
          </div>

          <div>
            <label for="logoFile">Logo</label>
            <input id="logoFile" type="file" accept="image/*" />
            <input id="logo" type="text" placeholder="URL логотипа" />
            <img id="logoPreview" class="preview hidden" alt="logo preview" />
          </div>
        </div>
        <div class="row" style="margin-top:12px">
          <button id="saveHero" class="btn">Сохранить главный экран</button>
        </div>
      </section>

      <section class="panel">
        <h2>Услуги</h2>
        <div id="servicesList"></div>
        <div class="row">
          <button id="addService" class="btn btn-secondary">Добавить услугу</button>
          <button id="saveServices" class="btn">Сохранить услуги</button>
        </div>
      </section>

      <section class="panel">
        <h2>Проекты</h2>
        <div id="projectsList"></div>
        <div class="row">
          <button id="addProject" class="btn btn-secondary">Добавить проект</button>
          <button id="saveProjects" class="btn">Сохранить проекты</button>
        </div>
      </section>

      <p id="status" class="status"></p>
    </section>
  </div>

  <script>
    const cfg = window.SUPABASE_CONFIG;
    if (!cfg || !cfg.url || !cfg.anonKey) {
      document.getElementById('authStatus').textContent = 'Ошибка: не загрузился supabase-config.js';
      document.getElementById('authStatus').classList.add('error');
      throw new Error('SUPABASE_CONFIG is missing');
    }

    const SUPABASE_URL = cfg.url;
    const SUPABASE_ANON_KEY = cfg.anonKey;
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authBox = document.getElementById('authBox');
    const adminApp = document.getElementById('adminApp');
    const authStatus = document.getElementById('authStatus');
    const statusBox = document.getElementById('status');
    const contactsStatusBox = document.getElementById('contactsStatus');
    const effectiveNotifyEmailBox = document.getElementById('effectiveNotifyEmail');
    const logoutBtn = document.getElementById('logoutBtn');

    const phoneInput = document.getElementById('phone');
    const whatsappInput = document.getElementById('whatsapp');
    const telegramInput = document.getElementById('telegram');
    const notifyEmailInput = document.getElementById('notifyEmail');
    const maxInput = document.getElementById('max');

    const heroTitleInput = document.getElementById('heroTitle');
    const heroSubtitleInput = document.getElementById('heroSubtitle');
    const badgeInput = document.getElementById('badge');
    const baseRateInput = document.getElementById('baseRate');

    const heroImageFileInput = document.getElementById('heroImageFile');
    const heroImageInput = document.getElementById('heroImage');
    const heroImagePreview = document.getElementById('heroImagePreview');

    const logoFileInput = document.getElementById('logoFile');
    const logoInput = document.getElementById('logo');
    const logoPreview = document.getElementById('logoPreview');

    const servicesList = document.getElementById('servicesList');
    const projectsList = document.getElementById('projectsList');

    const state = {
      settings: null,
      services: [],
      projects: [],
    };

    function setStatus(msg, isError = false) {
      statusBox.textContent = msg || '';
      statusBox.classList.toggle('error', !!isError);
      console[isError ? 'error' : 'log'](msg);
    }

    function setContactsStatus(msg, type = 'info') {
      contactsStatusBox.textContent = msg || '';
      contactsStatusBox.classList.remove('error', 'warning', 'success');
      if (type === 'error' || type === 'warning' || type === 'success') {
        contactsStatusBox.classList.add(type);
      }
    }

    function renderEffectiveNotifyEmail(settings = {}) {
      const email = String(settings.notifyEmail || '').trim();
      if (email) {
        effectiveNotifyEmailBox.textContent = `Текущий получатель заявок: ${email} (из settings.id = 1).`;
        effectiveNotifyEmailBox.classList.remove('warning');
      } else {
        effectiveNotifyEmailBox.textContent = 'Email в settings.id = 1 пустой — сервер использует fallback NOTIFY_EMAIL_TO.';
        effectiveNotifyEmailBox.classList.add('warning');
      }
    }

    function setAuthStatus(msg, isError = false) {
      authStatus.textContent = msg || '';
      authStatus.classList.toggle('error', !!isError);
      console[isError ? 'error' : 'log'](msg);
    }

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function showPreview(imgEl, url) {
      if (url) {
        imgEl.src = url;
        imgEl.classList.remove('hidden');
      } else {
        imgEl.src = '';
        imgEl.classList.add('hidden');
      }
    }

    async function uploadFile(file, folder) {
      if (!file) return '';
      const safeName = file.name.replace(/\s+/g, '-');
      const path = `${folder}/${Date.now()}-${safeName}`;
      const { error } = await client.storage.from('site-assets').upload(path, file, { upsert: true });
      if (error) throw error;
      const { data } = client.storage.from('site-assets').getPublicUrl(path);
      return data.publicUrl;
    }

    function normalizeSettings(row) {
      return {
        id: row?.id ?? 1,
        phone: row?.phone ?? '',
        whatsapp: row?.whatsapp ?? '',
        telegram: row?.telegram ?? '',
        notifyEmail: row?.notify_email ?? row?.notifyEmail ?? '',
        max: row?.max ?? '',
        heroTitle: row?.heroTitle ?? row?.herotitle ?? '',
        heroSubtitle: row?.heroSubtitle ?? row?.herosubtitle ?? '',
        heroImage: row?.heroImage ?? row?.heroimage ?? '',
        logo: row?.logo ?? '',
        badge: row?.badge ?? '',
        baseRate: row?.baseRate ?? row?.baserate ?? 5000
      };
    }

    function fillSettingsForm(settings) {
      phoneInput.value = settings.phone || '';
      whatsappInput.value = settings.whatsapp || '';
      telegramInput.value = settings.telegram || '';
      notifyEmailInput.value = settings.notifyEmail || '';
      maxInput.value = settings.max || '';
      heroTitleInput.value = settings.heroTitle || '';
      heroSubtitleInput.value = settings.heroSubtitle || '';
      heroImageInput.value = settings.heroImage || '';
      logoInput.value = settings.logo || '';
      badgeInput.value = settings.badge || '';
      baseRateInput.value = settings.baseRate || 5000;
      showPreview(heroImagePreview, settings.heroImage || '');
      showPreview(logoPreview, settings.logo || '');
      renderEffectiveNotifyEmail(settings);
    }

    function serviceItem(item = {}) {
      const div = document.createElement('div');
      div.className = 'item';
      div.dataset.id = item.id || uid();
      div.innerHTML = `
        <div class="grid">
          <div>
            <label>Заголовок</label>
            <input data-k="title" value="${escapeHtml(item.title || '')}" />
          </div>
          <div>
            <label>Порядок</label>
            <input data-k="sort_order" type="number" value="${item.sort_order ?? 1}" />
          </div>
          <div class="full">
            <label>Описание</label>
            <textarea data-k="description">${escapeHtml(item.description || '')}</textarea>
          </div>
        </div>
        <div class="row" style="margin-top:8px">
          <button type="button" class="btn btn-danger" data-remove>Удалить</button>
        </div>
      `;
      div.querySelector('[data-remove]').onclick = () => div.remove();
      return div;
    }

    function projectItem(item = {}) {
      const div = document.createElement('div');
      div.className = 'item';
      div.dataset.id = item.id || uid();
      const initialGallery = normalizeGalleryEntries(item.gallery_images || [], item.cover_image || item.image || '');
      div.innerHTML = `
        <div class="grid">
          <div>
            <label>Заголовок</label>
            <input data-k="title" value="${escapeHtml(item.title || '')}" />
          </div>
          <div>
            <label>Цена</label>
            <input data-k="price" value="${escapeHtml(item.price || '')}" />
          </div>
          <div class="full">
            <label>Описание</label>
            <textarea data-k="description">${escapeHtml(item.description || '')}</textarea>
          </div>
          <div>
            <label>Картинка (legacy)</label>
            <input data-k="imageFile" type="file" accept="image/*" />
          </div>
          <div>
            <label>URL картинки (legacy)</label>
            <input data-k="image" value="${escapeHtml(item.image || '')}" />
          </div>
          <div class="full">
            <label>Галерея проекта</label>
            <div class="gallery-tools">
              <button type="button" class="btn btn-secondary" data-k="galleryAddBtn">Добавить фото</button>
              <span class="small">Можно выбрать сразу несколько файлов.</span>
              <input data-k="galleryFiles" type="file" accept="image/*" multiple class="hidden" />
            </div>
            <div data-k="gallery_list" class="gallery-grid"></div>
            <details class="advanced">
              <summary>Служебный JSON галереи (для совместимости)</summary>
              <textarea data-k="gallery_json"></textarea>
            </details>
          </div>
          <div class="full">
            <label>Опции mini-configurator (JSON)</label>
            <textarea data-k="custom_options">${escapeHtml(JSON.stringify(item.custom_options || {}))}</textarea>
          </div>
        </div>
        <div class="row" style="margin-top:8px">
          <button type="button" class="btn btn-danger" data-remove>Удалить</button>
        </div>
      `;
      const galleryJsonTextarea = div.querySelector('[data-k="gallery_json"]');
      div._galleryState = { images: initialGallery };
      renderProjectGallery(div);
      galleryJsonTextarea.value = JSON.stringify(initialGallery, null, 2);
      galleryJsonTextarea.addEventListener('input', () => {
        try {
          const parsed = JSON.parse(galleryJsonTextarea.value || '[]');
          div._galleryState.images = normalizeGalleryEntries(parsed);
          renderProjectGallery(div);
        } catch {}
      });
      div.querySelector('[data-k="galleryAddBtn"]').onclick = () => div.querySelector('[data-k="galleryFiles"]').click();
      div.querySelector('[data-k="galleryFiles"]').addEventListener('change', async (event) => {
        const files = [...(event.target.files || [])];
        if (!files.length) return;
        try {
          setStatus(`Загрузка ${files.length} фото в галерею...`);
          for (const file of files) {
            const imageUrl = await uploadFile(file, 'projects');
            div._galleryState.images.push({
              id: uid(),
              image_url: imageUrl,
              alt_text: '',
              sort_order: div._galleryState.images.length + 1,
              is_cover: div._galleryState.images.length === 0
            });
          }
          div._galleryState.images = normalizeGalleryEntries(div._galleryState.images);
          renderProjectGallery(div);
          setStatus('Фото загружены в галерею');
        } catch (err) {
          setStatus('Ошибка загрузки в галерею: ' + explainError(err), true);
        } finally {
          event.target.value = '';
        }
      });
      div.querySelector('[data-remove]').onclick = () => div.remove();
      return div;
    }

    function normalizeGalleryEntries(gallery, fallbackImageUrl = '') {
      const source = Array.isArray(gallery) ? gallery : [];
      const normalized = source.map((g, idx) => {
        if (typeof g === 'string') {
          return { id: uid(), image_url: g, alt_text: '', sort_order: idx + 1, is_cover: idx === 0 };
        }
        return {
          id: g.id || uid(),
          image_url: g.image_url || g.url || '',
          alt_text: g.alt_text || '',
          sort_order: Number(g.sort_order || (idx + 1)),
          is_cover: !!g.is_cover
        };
      }).filter((g) => g.image_url);

      if (!normalized.length && fallbackImageUrl) {
        normalized.push({ id: uid(), image_url: fallbackImageUrl, alt_text: '', sort_order: 1, is_cover: true });
      }

      normalized.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      normalized.forEach((g, idx) => { g.sort_order = idx + 1; });
      if (normalized.length && !normalized.some((g) => g.is_cover)) normalized[0].is_cover = true;
      return normalized;
    }

    function renderProjectGallery(projectEl) {
      const list = projectEl.querySelector('[data-k="gallery_list"]');
      const jsonEl = projectEl.querySelector('[data-k="gallery_json"]');
      const gallery = projectEl._galleryState?.images || [];
      list.innerHTML = '';

      if (!gallery.length) {
        const empty = document.createElement('div');
        empty.className = 'gallery-empty';
        empty.textContent = 'Пока нет изображений. Добавьте фото для галереи.';
        list.appendChild(empty);
      }

      gallery.forEach((img, idx) => {
        const card = document.createElement('div');
        card.className = 'gallery-card';
        card.innerHTML = `
          ${img.is_cover ? '<div class="cover-badge">Обложка</div>' : ''}
          <img src="${escapeHtml(img.image_url)}" alt="preview" />
          <div class="gallery-meta">
            <input type="text" data-k="alt" placeholder="Описание (alt)" value="${escapeHtml(img.alt_text || '')}" />
            <input type="number" data-k="sort" min="1" value="${idx + 1}" />
          </div>
          <div class="gallery-actions">
            <button type="button" class="btn btn-secondary" data-act="cover">Сделать обложкой</button>
            <button type="button" class="btn btn-secondary" data-act="up">Выше</button>
            <button type="button" class="btn btn-secondary" data-act="down">Ниже</button>
            <button type="button" class="btn btn-danger" data-act="remove">Удалить</button>
          </div>
        `;
        card.querySelector('[data-k="alt"]').addEventListener('input', (e) => {
          projectEl._galleryState.images[idx].alt_text = e.target.value;
          syncProjectGalleryJson(projectEl);
        });
        card.querySelector('[data-k="sort"]').addEventListener('change', (e) => {
          const to = Math.max(1, Number(e.target.value || idx + 1));
          moveGalleryItem(projectEl, idx, to - 1);
        });
        card.querySelector('[data-act="cover"]').onclick = () => {
          projectEl._galleryState.images.forEach((x) => (x.is_cover = false));
          projectEl._galleryState.images[idx].is_cover = true;
          renderProjectGallery(projectEl);
        };
        card.querySelector('[data-act="remove"]').onclick = () => {
          projectEl._galleryState.images.splice(idx, 1);
          projectEl._galleryState.images = normalizeGalleryEntries(projectEl._galleryState.images);
          renderProjectGallery(projectEl);
        };
        card.querySelector('[data-act="up"]').onclick = () => moveGalleryItem(projectEl, idx, idx - 1);
        card.querySelector('[data-act="down"]').onclick = () => moveGalleryItem(projectEl, idx, idx + 1);
        list.appendChild(card);
      });

      jsonEl.value = JSON.stringify(gallery.map((g, idx) => ({
        image_url: g.image_url,
        alt_text: g.alt_text || '',
        sort_order: idx + 1,
        is_cover: !!g.is_cover
      })), null, 2);
    }

    function moveGalleryItem(projectEl, from, to) {
      const gallery = projectEl._galleryState.images;
      if (!gallery.length) return;
      const boundedTo = Math.max(0, Math.min(gallery.length - 1, to));
      if (from === boundedTo || from < 0 || from >= gallery.length) return;
      const [item] = gallery.splice(from, 1);
      gallery.splice(boundedTo, 0, item);
      projectEl._galleryState.images = normalizeGalleryEntries(gallery);
      renderProjectGallery(projectEl);
    }

    function syncProjectGalleryJson(projectEl) {
      const jsonEl = projectEl.querySelector('[data-k="gallery_json"]');
      if (!jsonEl) return;
      jsonEl.value = JSON.stringify(projectEl._galleryState.images.map((g, idx) => ({
        image_url: g.image_url,
        alt_text: g.alt_text || '',
        sort_order: idx + 1,
        is_cover: !!g.is_cover
      })), null, 2);
    }

    function renderServices(items) {
      servicesList.innerHTML = '';
      (items || []).forEach(item => servicesList.appendChild(serviceItem(item)));
      if (!servicesList.children.length) {
        servicesList.appendChild(serviceItem({ sort_order: 1 }));
      }
    }

    function renderProjects(items) {
      projectsList.innerHTML = '';
      (items || []).forEach(item => projectsList.appendChild(projectItem(item)));
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function loadSettings() {
      const { data, error } = await client
        .from('settings')
        .select('*')
        .eq('id', 1)
        .maybeSingle();

      if (error) throw error;
      const settings = normalizeSettings(data || {});
      state.settings = settings;
      fillSettingsForm(settings);
    }

    async function loadServices() {
      const { data, error } = await client
        .from('services')
        .select('*')
        .order('sort_order', { ascending: true });

      if (error) throw error;
      state.services = data || [];
      renderServices(state.services);
    }

    async function loadProjects() {
      const { data, error } = await client.from('projects').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      const rows = data || [];
      const { data: images } = await client.from('project_images').select('*').in('project_id', rows.map((r)=>r.id));
      const grouped = new Map();
      (images || []).forEach((img) => {
        if (!grouped.has(img.project_id)) grouped.set(img.project_id, []);
        grouped.get(img.project_id).push(img);
      });
      state.projects = rows.map((r) => ({ ...r, gallery_images: grouped.get(r.id) || [] }));
      renderProjects(state.projects);
    }

    async function loadAllData() {
      setStatus('Загрузка данных...');
      await Promise.all([
        loadSettings(),
        loadServices(),
        loadProjects()
      ]);
      setStatus('Данные загружены');
    }

    function wireRealtime() {
      client
        .channel('admin-settings')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, async () => {
          try { await loadSettings(); } catch (e) { console.error('settings realtime failed', e); }
        })
        .subscribe();

      client
        .channel('admin-services')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'services' }, async () => {
          try { await loadServices(); } catch (e) { console.error('services realtime failed', e); }
        })
        .subscribe();

      client
        .channel('admin-projects')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, async () => {
          try { await loadProjects(); } catch (e) { console.error('projects realtime failed', e); }
        })
        .subscribe();
    }

    function explainError(err) {
      const msg = err?.message || String(err || 'Unknown error');
      if (/Invalid API key/i.test(msg)) return 'Неверный Supabase ключ.';
      if (/Failed to fetch|Load failed|fetch failed/i.test(msg)) return 'Сеть не может достучаться до Supabase. Проверь URL, ключ, HTTPS и CORS.';
      if (/CORS/i.test(msg)) return 'Браузер блокирует запрос к Supabase из-за CORS.';
      const code = err?.code ? ` [${err.code}]` : '';
      const details = [err?.details, err?.hint].filter(Boolean).join(' | ');
      return `${msg}${code}${details ? ` — ${details}` : ''}`;
    }

    function throwIfSupabaseError(result, operationLabel) {
      if (!result?.error) return;
      const sourceError = result.error;
      const details = [sourceError.message, sourceError.details, sourceError.hint].filter(Boolean).join(' | ');
      const err = new Error(`${operationLabel}: ${details || 'неизвестная ошибка Supabase'}`);
      err.cause = sourceError;
      throw err;
    }

    async function initAuth() {
      const { data, error } = await client.auth.getSession();
      if (error) throw error;

      const session = data?.session;
      if (session) {
        authBox.classList.add('hidden');
        adminApp.classList.remove('hidden');
        logoutBtn.classList.remove('hidden');
        setAuthStatus(`Вход выполнен: ${session.user.email}`);
        await loadAllData();
        wireRealtime();
      } else {
        authBox.classList.remove('hidden');
        adminApp.classList.add('hidden');
        logoutBtn.classList.add('hidden');
        setAuthStatus('Выполните вход для доступа к управлению контентом.');
      }
    }

    document.getElementById('loginBtn').onclick = async () => {
      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        setAuthStatus('Выполняется вход...');
        const { error } = await client.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await initAuth();
      } catch (err) {
        setAuthStatus('Ошибка входа: ' + explainError(err), true);
      }
    };

    logoutBtn.onclick = async () => {
      try {
        await client.auth.signOut();
        location.reload();
      } catch (err) {
        setStatus('Ошибка выхода: ' + explainError(err), true);
      }
    };

    heroImageInput.addEventListener('input', () => showPreview(heroImagePreview, heroImageInput.value.trim()));
    logoInput.addEventListener('input', () => showPreview(logoPreview, logoInput.value.trim()));

    document.getElementById('saveContacts').onclick = async () => {
      try {
        const notifyEmail = notifyEmailInput.value.trim();
        if (!notifyEmail) {
          setContactsStatus('Предупреждение: email пустой. Уведомления пойдут в fallback NOTIFY_EMAIL_TO (если он настроен на сервере).', 'warning');
        }
        const contactsRes = await client.from('settings').upsert({
          id: 1,
          phone: phoneInput.value.trim(),
          whatsapp: whatsappInput.value.trim(),
          telegram: telegramInput.value.trim(),
          notify_email: notifyEmail,
          max: maxInput.value.trim(),
          updated_at: new Date().toISOString()
        }, { onConflict: 'id' });
        throwIfSupabaseError(contactsRes, 'Не удалось сохранить контакты');

        setContactsStatus('Контакты сохранены в settings.id = 1.', 'success');
        setStatus('Контакты сохранены');
        await loadSettings();
      } catch (err) {
        setContactsStatus('Ошибка сохранения контактов: ' + explainError(err), 'error');
        setStatus('Ошибка сохранения контактов: ' + explainError(err), true);
      }
    };

    document.getElementById('saveHero').onclick = async () => {
      try {
        setStatus('Сохранение главного экрана...');

        let heroImage = heroImageInput.value.trim();
        let logo = logoInput.value.trim();

        if (heroImageFileInput.files[0]) {
          heroImage = await uploadFile(heroImageFileInput.files[0], 'hero');
        }
        if (logoFileInput.files[0]) {
          logo = await uploadFile(logoFileInput.files[0], 'logo');
        }

        const heroRes = await client.from('settings').upsert({
          id: 1,
          heroTitle: heroTitleInput.value.trim(),
          heroSubtitle: heroSubtitleInput.value.trim(),
          heroImage,
          logo,
          badge: badgeInput.value.trim(),
          baseRate: Number(baseRateInput.value || 5000),
          updated_at: new Date().toISOString()
        }, { onConflict: 'id' });
        throwIfSupabaseError(heroRes, 'Не удалось сохранить главный экран');

        setStatus('Главный экран сохранён');
        await loadSettings();
      } catch (err) {
        setStatus('Ошибка сохранения главного экрана: ' + explainError(err), true);
      }
    };

    document.getElementById('addService').onclick = () => {
      servicesList.appendChild(serviceItem({ sort_order: servicesList.children.length + 1 }));
    };

    document.getElementById('saveServices').onclick = async () => {
      try {
        setStatus('Сохранение услуг...');
        const rows = [...servicesList.querySelectorAll('.item')].map((el, idx) => ({
          id: el.dataset.id,
          title: el.querySelector('[data-k="title"]').value.trim(),
          description: el.querySelector('[data-k="description"]').value.trim(),
          sort_order: Number(el.querySelector('[data-k="sort_order"]').value || (idx + 1))
        }));

        const deleteServicesRes = await client.from('services').delete().neq('id', '00000000-0000-0000-0000-000000000000');
        throwIfSupabaseError(deleteServicesRes, 'Не удалось очистить услуги');
        if (rows.length) {
          const upsertServicesRes = await client.from('services').upsert(rows);
          throwIfSupabaseError(upsertServicesRes, 'Не удалось сохранить услуги');
        }
        setStatus('Услуги сохранены');
        await loadServices();
      } catch (err) {
        setStatus('Ошибка сохранения услуг: ' + explainError(err), true);
      }
    };

    document.getElementById('addProject').onclick = () => {
      projectsList.appendChild(projectItem({}));
    };

    document.getElementById('saveProjects').onclick = async () => {
      try {
        setStatus('Сохранение проектов...');
        const rows = [];
        const imageRows = [];
        const items = [...projectsList.querySelectorAll('.item')];

        for (const el of items) {
          const file = el.querySelector('[data-k="imageFile"]').files[0];
          let imageUrl = el.querySelector('[data-k="image"]').value.trim();
          if (file) imageUrl = await uploadFile(file, 'projects');

          let customOptions = {};
          let gallery = [];
          try { customOptions = JSON.parse(el.querySelector('[data-k="custom_options"]').value || '{}'); } catch {}
          try { gallery = JSON.parse(el.querySelector('[data-k="gallery_json"]').value || '[]'); } catch {}
          if (Array.isArray(el._galleryState?.images) && el._galleryState.images.length) {
            gallery = el._galleryState.images;
          }

          const normalizedGallery = normalizeGalleryEntries(gallery, imageUrl);
          const cover = normalizedGallery.find((g) => g.is_cover) || normalizedGallery[0] || null;
          if (!imageUrl && cover?.image_url) imageUrl = cover.image_url;

          rows.push({
            id: el.dataset.id,
            title: el.querySelector('[data-k="title"]').value.trim(),
            description: el.querySelector('[data-k="description"]').value.trim(),
            image: imageUrl,
            cover_image: cover?.image_url || imageUrl,
            custom_options: customOptions,
            price: el.querySelector('[data-k="price"]').value.trim() || null,
            created_at: new Date().toISOString()
          });

          normalizedGallery.forEach((g) => {
            if (!g.image_url) return;
            imageRows.push({ project_id: el.dataset.id, image_url: g.image_url, alt_text: g.alt_text, sort_order: g.sort_order, is_cover: g.is_cover });
          });
          if (!normalizedGallery.length && imageUrl) {
            imageRows.push({ project_id: el.dataset.id, image_url: imageUrl, alt_text: '', sort_order: 1, is_cover: true });
          }
        }

        const currentIds = state.projects.map((p) => p.id);
        const nextIds = rows.map((r) => r.id);
        const removedIds = currentIds.filter((id) => !nextIds.includes(id));

        if (rows.length) {
          const upsertProjectsResult = await client.from('projects').upsert(rows, { onConflict: 'id' });
          throwIfSupabaseError(upsertProjectsResult, 'Не удалось сохранить проекты');
        }

        for (const projectId of nextIds) {
          const clearImagesRes = await client.from('project_images').delete().eq('project_id', projectId);
          throwIfSupabaseError(clearImagesRes, `Не удалось очистить галерею проекта ${projectId}`);
          const projectImages = imageRows.filter((row) => row.project_id === projectId);
          if (projectImages.length) {
            const insertImagesResult = await client.from('project_images').insert(projectImages);
            throwIfSupabaseError(insertImagesResult, `Не удалось сохранить изображения проекта ${projectId}`);
          }
        }

        if (removedIds.length) {
          const deleteRemovedProjects = await client.from('projects').delete().in('id', removedIds);
          throwIfSupabaseError(deleteRemovedProjects, 'Не удалось удалить удалённые проекты');
        }

        setStatus('Проекты сохранены');
        await loadProjects();
      } catch (err) {
        setStatus('Ошибка сохранения проектов: ' + explainError(err), true);
      }
    };

    (async function boot() {
      try {
        await initAuth();
      } catch (err) {
        const msg = explainError(err);
        setAuthStatus('Ошибка инициализации: ' + msg, true);
        setStatus('Диагностика: ' + msg, true);
      }
    })();
  </script>
</body>
</html>
