      <stop offset="0.26" stop-color="#B7833A"/>
      <stop offset="0.5" stop-color="#F1D18B"/>
      <stop offset="0.73" stop-color="#A56F2C"/>
      <stop offset="1" stop-color="#E6BD70"/>
    </linearGradient>
    <linearGradient id="metalSoft" x1="34" y1="136" x2="132" y2="36" gradientUnits="userSpaceOnUse">
