<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="teksturaMarkTitle teksturaMarkDesc">
  <title id="teksturaMarkTitle">Tekstura mark</title>
