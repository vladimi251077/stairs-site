<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Калькулятор лестницы онлайн — рассчитать стоимость | Tekstura</title>
  <meta name="description" content="Онлайн-калькулятор лестницы: рассчитайте параметры, материалы и ориентировочную стоимость проекта. Быстрый расчёт от Tekstura.">
  <link rel="canonical" href="https://tekstura.shop/calculator.html">
  <meta property="og:type" content="website"><meta property="og:site_name" content="Tekstura">
  <meta property="og:title" content="Калькулятор лестницы онлайн — рассчитать стоимость | Tekstura">
  <meta property="og:description" content="Онлайн-калькулятор лестницы: рассчитайте параметры, материалы и ориентировочную стоимость проекта. Быстрый расчёт от Tekstura.">
  <meta property="og:url" content="https://tekstura.shop/calculator.html">
  <link rel="stylesheet" href="/stair-configurator.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
</head>
<body>
<main class="wrap">
  <section class="hero panel"><div class="top"><div class="hero-content"><p class="eyebrow">Tekstura Engineering</p><h1>Калькулятор лестницы онлайн</h1><p class="hero-subtitle">Расчёт геометрии, материалов и цены с расширенными настройками.</p></div><a class="back-link" href="/">На главную</a></div></section>
  <div class="panel configurator-panel">
    <div id="pageStatus" class="muted" aria-live="polite"></div>

    <section class="step active" id="step1">
      <h2>Шаг 1. Конфигурация лестницы</h2>

      <div class="field"><label>Тип лестницы</label>
        <div class="visual-choice" data-target="stairType">
          <button type="button" class="visual-card selected" data-value="straight"><span>↗</span><b>Прямая</b><small>Классическая одномаршевая</small></button>
          <button type="button" class="visual-card" data-value="l_turn_landing"><span>└</span><b>Г-образная (площадка)</b><small>Поворот 90° с площадкой</small></button>
          <button type="button" class="visual-card" data-value="l_turn_winders"><span>⤴</span><b>Г-образная (забежные)</b><small>Компактный поворот</small></button>
          <button type="button" class="visual-card" data-value="u_turn_landing"><span>∪</span><b>П-образная (площадка)</b><small>Разворот 180°</small></button>
          <button type="button" class="visual-card" data-value="u_turn_winders"><span>⤿</span><b>П-образная (забежные)</b><small>Разворот на забежных</small></button>
        </div>
        <input type="hidden" id="stairType" value="straight">
      </div>

      <div class="grid">
        <div class="field" id="turnDirectionField"><label>Направление поворота</label><select id="turnDirection"><option value="left">Левый</option><option value="right">Правый</option></select></div>
        <div class="field"><label>Высота этаж-этаж (мм)</label><input id="floorHeight" type="number" placeholder="3000"></div>
        <div class="field"><label>Длина проёма (мм)</label><input id="openingLength" type="number" placeholder="4200"></div>
        <div class="field"><label>Ширина проёма (мм)</label><input id="openingWidth" type="number" placeholder="2100"></div>
        <div class="field"><label>Ширина марша (мм)</label><input id="marchWidth" type="number" placeholder="1000"></div>
        <div class="field"><label>Расстояние доставки (км)</label><input id="deliveryDistance" type="number" placeholder="20"></div>
      </div>

      <div class="field"><label>Материал каркаса</label>
        <div class="visual-choice" data-target="frameMaterial">
          <button type="button" class="visual-card selected" data-value="metal"><span>▦</span><b>Металл</b><small>Высокая жёсткость</small></button>
          <button type="button" class="visual-card" data-value="wood"><span>▤</span><b>Дерево</b><small>Тёплая фактура</small></button>
          <button type="button" class="visual-card" data-value="concrete"><span>▩</span><b>Бетон</b><small>Монолитное основание</small></button>
        </div><input type="hidden" id="frameMaterial" value="metal"></div>

      <div class="field"><label>Облицовка</label>
        <div class="visual-choice" data-target="claddingType">
          <button type="button" class="visual-card" data-value="none"><span>○</span><b>Без облицовки</b><small>Только базовые поверхности</small></button>
          <button type="button" class="visual-card selected" data-value="standard"><span>◑</span><b>Стандарт</b><small>Надёжные материалы</small></button>
          <button type="button" class="visual-card" data-value="premium"><span>●</span><b>Премиум</b><small>Шпон/массив/камень</small></button>
        </div><input type="hidden" id="claddingType" value="standard"></div>

      <div class="field"><label>Ограждение</label>
        <div class="visual-choice" data-target="railingType">
          <button type="button" class="visual-card" data-value="none"><span>∅</span><b>Без ограждения</b><small>Для ниш/второго света</small></button>
          <button type="button" class="visual-card selected" data-value="metal"><span>║</span><b>Металл</b><small>Минимализм</small></button>
          <button type="button" class="visual-card" data-value="glass"><span>▯</span><b>Стекло</b><small>Визуальная лёгкость</small></button>
          <button type="button" class="visual-card" data-value="wood"><span>▮</span><b>Дерево</b><small>Классический образ</small></button>
        </div><input type="hidden" id="railingType" value="metal"></div>

      <div class="grid">
        <div class="field"><label>Уровень финиша</label><select id="finishLevel"><option value="basic">Базовый</option><option value="standard">Стандарт</option><option value="premium">Премиум</option></select></div>
        <div class="field"><label>Доп. опции</label>
          <div class="extras-list">
            <label><input type="checkbox" name="extras" value="lighting"> Подсветка ступеней</label>
            <label><input type="checkbox" name="extras" value="painted_metal"> Окраска металла</label>
            <label><input type="checkbox" name="extras" value="premium_coating"> Премиум-покрытие</label>
            <label><input type="checkbox" name="extras" value="hidden_fasteners"> Скрытый крепёж</label>
          </div>
        </div>
      </div>

      <div class="actions"><button class="btn-primary" id="toResultsBtn">Рассчитать геометрию</button></div>
    </section>

    <section class="step" id="step2"><h2>Геометрия лестницы</h2><div id="geometryResult" class="result-box"></div><div id="geometryWarnings"></div><div class="actions"><button class="btn-secondary" onclick="prevStep(1)">Назад</button><button class="btn-primary" id="calculateBtn">Перейти к материалам и цене</button></div></section>
    <section class="step" id="step3"><h2>Материалы</h2><div id="materialsResult" class="result-box"></div><div class="actions"><button class="btn-secondary" onclick="prevStep(2)">Назад</button><button class="btn-primary" onclick="nextStep(4)">Рассчитать стоимость</button></div></section>
    <section class="step" id="step4"><h2>Стоимость</h2><div id="priceResult" class="result-box"></div><div class="actions"><button class="btn-secondary" onclick="prevStep(3)">Назад</button><a id="requestBtn" class="btn-primary" href="/request.html">Оставить заявку по расчёту</a></div></section>
  </div>
</main>
<script type="module" src="/stair-configurator.js"></script>
</body>
</html>
