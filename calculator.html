e<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Калькулятор лестницы Tekstura</title>
<style>
body { background:#0f0c0a; color:#f4e7d4; font-family:Inter, Arial, sans-serif; margin:0; }
.container { max-width:800px; margin:0 auto; padding:20px; }
progress { width:100%; height:10px; margin:10px 0; }
.step { display:none; }
.step.active { display:block; }
button { margin:10px 0; padding:10px 20px; border:0; border-radius:5px; background:#e8c8a2; color:#1a120e; font-weight:600; cursor:pointer; }
input, select { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #444; background:#1a120e; color:#f4e7d4; }
label { display:block; margin-top:10px; }
.card-group { display:flex; gap:10px; flex-wrap:wrap; }
.card { flex:1 1 30%; padding:10px; border:1px solid #444; border-radius:8px; cursor:pointer; text-align:center; }
.card.selected { border-color:#e8c8a2; background:#201b18; }
small { display:block; font-size:12px; color:#b9aa97; }
</style>
</head>
<body>
<div class="container">
<h1>Калькулятор лестницы</h1>
<progress id="progress" value="1" max="5"></progress>

<div class="step active" id="step1">
<h2>Шаг 1. Тип лестницы</h2>
<div class="card-group" id="stairTypeCards">
<div class="card" data-value="straight">Прямая</div>
<div class="card" data-value="l_turn">Г‑образная</div>
<div class="card" data-value="u_turn">П‑образная</div>
</div>
<button onclick="nextStep()">Далее</button>
</div>

<div class="step" id="step2">
<h2>Шаг 2. Параметры проёма</h2>
<label>Высота этаж-этаж (мм)<input type="number" id="floorHeight" placeholder="3000"></label>
<label>Длина проёма (мм)<input type="number" id="openingLength" placeholder="4200"></label>
<label>Ширина проёма (мм)<input type="number" id="openingWidth" placeholder="1200"></label>
<label>Ширина марша (мм)<input type="number" id="marchWidth" placeholder="1000"></label>
<button onclick="prevStep()">Назад</button>
<button onclick="nextStep()">Далее</button>
</div>

<div class="step" id="step3">
<h2>Шаг 3. Материал каркаса</h2>
<div class="card-group" id="frameMaterialCards">
<div class="card" data-value="metal">Металлокаркас<br><small>Высокая жёсткость</small></div>
<div class="card" data-value="concrete">Бетонный каркас<br><small>Монолитное основание</small></div>
<div class="card" data-value="wood">Деревянный каркас<br><small>Тёплая фактура</small></div>
</div>
<button onclick="prevStep()">Назад</button>
<button onclick="nextStep()">Далее</button>
</div>

<div class="step" id="step4">
<h2>Шаг 4. Отделка и ограждение</h2>
<label>Облицовка<select id="cladding"><option value="none">Без облицовки</option><option value="standard">Стандарт</option><option value="premium">Премиум</option></select></label>
<label>Ограждение<select id="railing"><option value="none">Без ограждения</option><option value="metal">Металл</option><option value="glass">Стекло</option><option value="wood">Дерево</option></select></label>
<label><input type="checkbox" id="lighting"> Подсветка ступеней</label>
<label><input type="checkbox" id="coating"> Премиум покраска</label>
<button onclick="prevStep()">Назад</button>
<button onclick="nextStep()">Далее</button>
</div>

<div class="step" id="step5">
<h2>Шаг 5. Итог</h2>
<div id="summary"></div>
<label>Ваше имя<input type="text" id="name"></label>
<label>Телефон<input type="tel" id="phone"></label>
<button onclick="prevStep()">Назад</button>
<button onclick="submitRequest()">Отправить заявку</button>
</div>
</div>

<script>
let currentStep = 1;
const maxStep = 5;
const state = {};

function updateProgress() {
 document.getElementById('progress').value = currentStep;
}

function showStep(step) {
 document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
 document.getElementById('step' + step).classList.add('active');
 currentStep = step;
 updateProgress();
}

function nextStep() {
 if (currentStep === 1) {
   const selected = document.querySelector('#stairTypeCards .selected');
   if (!selected) { alert('Выберите тип лестницы'); return; }
   state.stair_type = selected.dataset.value;
 }
 if (currentStep === 2) {
   state.floor_height = document.getElementById('floorHeight').value;
   state.opening_length = document.getElementById('openingLength').value;
   state.opening_width = document.getElementById('openingWidth').value;
   state.march_width = document.getElementById('marchWidth').value;
 }
 if (currentStep === 3) {
   const selected = document.querySelector('#frameMaterialCards .selected');
   if (!selected) { alert('Выберите материал каркаса'); return; }
   state.frame_material = selected.dataset.value;
 }
 if (currentStep === 4) {
   state.cladding = document.getElementById('cladding').value;
   state.railing = document.getElementById('railing').value;
   state.lighting = document.getElementById('lighting').checked;
   state.coating = document.getElementById('coating').checked;
   // Пример расчёта: складываем базовую цену и наценки
   let basePrice = 100000;
   if (state.frame_material === 'concrete') basePrice += 42000;
   if (state.frame_material === 'wood') basePrice += 26000;
   if (state.cladding === 'premium') basePrice += 52000;
   if (state.railing === 'glass') basePrice += 38000;
   if (state.railing === 'wood') basePrice += 21000;
   if (state.lighting) basePrice += 26000;
   if (state.coating) basePrice += 18000;
   state.total_price = basePrice;
   const summary = document.getElementById('summary');
   summary.innerHTML = '<p>Тип: ' + state.stair_type + '</p>' +
     '<p>Каркас: ' + state.frame_material + '</p>' +
     '<p>Облицовка: ' + state.cladding + '</p>' +
     '<p>Ограждение: ' + state.railing + '</p>' +
     '<p>Доп. опции: ' + (state.lighting ? 'Подсветка, ' : '') + (state.coating ? 'Премиум покраска' : '') + '</p>' +
     '<p><strong>Предварительная стоимость: ' + basePrice.toLocaleString('ru-RU') + ' ₽</strong></p>' +
     '<p>Это предварительный расчёт. Точная стоимость будет определена после замера и выбора материалов.</p>';
 }
 if (currentStep < maxStep) showStep(currentStep + 1);
}

function prevStep() {
 if (currentStep > 1) showStep(currentStep - 1);
}

function selectCard(groupId, card) {
 const group = document.getElementById(groupId);
 group.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
 card.classList.add('selected');
}

// Обработчики выбора карточек
document.querySelectorAll('#stairTypeCards .card').forEach(card => {
 card.addEventListener('click', () => selectCard('stairTypeCards', card));
});
document.querySelectorAll('#frameMaterialCards .card').forEach(card => {
 card.addEventListener('click', () => selectCard('frameMaterialCards', card));
});

function submitRequest() {
 const name = document.getElementById('name').value.trim();
 const phone = document.getElementById('phone').value.trim();
 if (!name || !phone) { alert('Заполните имя и телефон'); return; }
 const payload = { name, phone, ...state };
 alert('Заявка отправлена! Спасибо, ' + name + '. Наш менеджер свяжется с вами.');
 console.log('Payload:', payload);
}
</script>
</body>
</html>
