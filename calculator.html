<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Калькулятор лестницы онлайн — рассчитать стоимость | Tekstura</title>
  <meta name="description" content="Онлайн-калькулятор лестницы: рассчитайте параметры, материалы и ориентировочную стоимость проекта. Быстрый расчёт от Tekstura.">
  <link rel="canonical" href="https://tekstura.shop/calculator.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Tekstura">
  <meta property="og:title" content="Калькулятор лестницы онлайн — рассчитать стоимость | Tekstura">
  <meta property="og:description" content="Онлайн-калькулятор лестницы: рассчитайте параметры, материалы и ориентировочную стоимость проекта. Быстрый расчёт от Tekstura.">
  <meta property="og:url" content="https://tekstura.shop/calculator.html">
  <link rel="stylesheet" href="/stair-configurator.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
</head>

<body>

<main class="wrap">

  <!-- HERO -->
  <section class="hero panel">
    <div class="top">
      <div class="hero-content">
        <p class="eyebrow">Tekstura Engineering</p>
        <h1>Конфигуратор лестницы</h1>
        <p class="hero-subtitle">
          Сначала рассчитывается геометрия, затем материалы и только после этого стоимость.
        </p>
      </div>

      <a class="back-link" href="/">На главную</a>
    </div>
  </section>

  <!-- CONFIGURATOR -->
  <div class="panel configurator-panel">

    <!-- STEP 1 -->
    <section class="step active" id="step1">
      <h2>Шаг 1. Конфигурация лестницы</h2>

      <div class="grid">

        <div class="field">
          <label>Тип проёма</label>
          <select id="openingType">
            <option value="straight">Прямой</option>
            <option value="l_turn">Г-образный</option>
            <option value="u_turn">П-образный</option>
          </select>
        </div>

        <div class="field">
          <label>Тип лестницы</label>
          <select id="stairType">
            <option value="straight">Прямая</option>
            <option value="l_turn">Г-образная</option>
            <option value="u_turn">П-образная</option>
          </select>
        </div>

        <div class="field" id="turnDirectionField">
          <label>Направление поворота</label>
          <select id="turnDirection">
            <option value="left">Левый</option>
            <option value="right">Правый</option>
          </select>
        </div>

        <div class="field" id="turnTypeField">
          <label>Тип поворота</label>
          <select id="turnType">
            <option value="landing">Площадка</option>
            <option value="winders">Забежные ступени</option>
          </select>
        </div>

        <div class="field">
          <label>Высота этаж-этаж (мм)</label>
          <input id="floorHeight" type="number" placeholder="3000">
        </div>

        <div class="field">
          <label>Длина проёма (мм)</label>
          <input id="openingLength" type="number" placeholder="4200">
        </div>

        <div class="field">
          <label>Ширина проёма (мм)</label>
          <input id="openingWidth" type="number" placeholder="1200">
        </div>

        <div class="field">
          <label>Ширина марша (мм)</label>
          <input id="marchWidth" type="number" placeholder="1000">
        </div>

        <div class="field">
          <label>Материал каркаса</label>
          <select id="frameMaterial">
            <option value="metal">Металл</option>
            <option value="wood">Дерево</option>
            <option value="concrete">Бетон</option>
          </select>
        </div>

        <div class="field">
          <label>Уровень отделки</label>
          <select id="finishLevel">
            <option value="basic">Базовый</option>
            <option value="standard">Стандарт</option>
            <option value="premium">Премиум</option>
          </select>
        </div>

      </div>

      <div class="actions">
        <button class="btn-primary" id="toResultsBtn">
          Рассчитать геометрию
        </button>
      </div>
    </section>

    <!-- STEP 2 -->
    <section class="step" id="step2">
      <h2>Геометрия лестницы</h2>

      <div id="geometryResult" class="result-box"></div>
      <div id="geometryWarnings"></div>

      <div class="actions">
        <button class="btn-secondary" onclick="prevStep(1)">Назад</button>
        <button class="btn-primary" id="calculateBtn">
          Перейти к материалам и цене
        </button>
      </div>
    </section>

    <!-- STEP 3 -->
    <section class="step" id="step3">
      <h2>Материалы</h2>

      <div id="materialsResult" class="result-box"></div>

      <div class="actions">
        <button class="btn-secondary" onclick="prevStep(2)">Назад</button>
        <button class="btn-primary" onclick="nextStep(4)">
          Рассчитать стоимость
        </button>
      </div>
    </section>

    <!-- STEP 4 -->
    <section class="step" id="step4">
      <h2>Стоимость</h2>

      <div id="priceResult" class="result-box"></div>

      <div class="actions">
        <button class="btn-secondary" onclick="prevStep(3)">Назад</button>
      </div>
    </section>

  </div>

</main>

<script type="module" src="/stair-configurator.js"></script>

</body>
</html>
