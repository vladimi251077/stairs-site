<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Конфигуратор лестницы — Tekstura</title>
  <link rel="stylesheet" href="/stair-configurator.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>Инженерный конфигуратор лестницы</h1>
        <p class="muted">Сначала рассчитывается геометрия, затем материалы и только после этого стоимость.</p>
      </div>
      <a class="back-link" href="/">На главную</a>
    </div>

    <div class="panel">
      <section class="step active" id="step1">
        <h2>Шаг 1. Конфигурация лестницы</h2>
        <div class="grid">
          <div class="field">
            <label for="openingType">Тип проёма</label>
            <select id="openingType">
              <option value="straight">Прямой</option>
              <option value="l_turn">Г-образный</option>
              <option value="u_turn">П-образный</option>
            </select>
          </div>
          <div class="field">
            <label for="stairType">Тип лестницы</label>
            <select id="stairType">
              <option value="straight">Прямая</option>
              <option value="l_turn">Г-образная</option>
              <option value="u_turn">П-образная (подготовка)</option>
            </select>
          </div>
          <div class="field" id="turnDirectionField">
            <label for="turnDirection">Направление поворота</label>
            <select id="turnDirection">
              <option value="left">Левый</option>
              <option value="right">Правый</option>
            </select>
          </div>
          <div class="field" id="turnTypeField">
            <label for="turnType">Тип поворота</label>
            <select id="turnType">
              <option value="landing">Площадка</option>
              <option value="winders">Забежные ступени</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button class="btn-primary" type="button" onclick="nextStep(2)">Дальше</button>
        </div>
      </section>

      <section class="step" id="step2">
        <h2>Шаг 2. Параметры проёма</h2>
        <div class="grid">
          <div class="field">
            <label for="floorHeight">Высота от пола до пола, мм</label>
            <input id="floorHeight" type="number" value="3000" min="2000" max="5000">
          </div>
          <div class="field">
            <label for="openingLength">Длина проёма, мм</label>
            <input id="openingLength" type="number" value="4200" min="1500" max="10000">
          </div>
          <div class="field">
            <label for="openingWidth">Ширина проёма, мм</label>
            <input id="openingWidth" type="number" value="2200" min="900" max="5000">
          </div>
          <div class="field">
            <label for="marchWidth">Ширина марша, мм</label>
            <input id="marchWidth" type="number" value="1000" min="700" max="1800">
          </div>
        </div>

        <div class="grid">
          <div class="field">
            <label for="frameMaterial">Тип каркаса</label>
            <select id="frameMaterial">
              <option value="metal">metal</option>
              <option value="wood">wood</option>
              <option value="concrete">concrete</option>
            </select>
          </div>
          <div class="field">
            <label for="finishLevel">Уровень отделки</label>
            <select id="finishLevel">
              <option value="basic">Базовый</option>
              <option value="standard">Стандарт</option>
              <option value="premium">Премиум</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button class="btn-secondary" type="button" onclick="prevStep(1)">Назад</button>
          <button class="btn-primary" id="toResultsBtn" type="button">Рассчитать геометрию</button>
        </div>
      </section>

      <section class="step" id="step3">
        <h2>Шаг 3. Геометрия и предупреждения</h2>
       <div id="geometryResult" class="result-box"></div>
        <div id="geometryWarnings" class="result-box"></div>
        <div class="actions">
          <button class="btn-secondary" type="button" onclick="prevStep(2)">Назад</button>
          <button class="btn-primary" id="calculateBtn" type="button">Перейти к материалам и цене</button>
        </div>
      </section>

      <section class="step" id="step4">
        <h2>Шаг 4. Материалы и стоимость</h2>
        <div class="result-box">
          <h3>Материалы</h3>
          <div id="materialsResult"></div>
        </div>
        <div class="result-box">
          <h3>Стоимость</h3>
          <div id="priceResult"></div>
        </div>

        <div class="actions">
          <button class="btn-secondary" type="button" onclick="prevStep(3)">Назад</button>
          <a class="back-link" href="/request.html">Оставить заявку</a>
        </div>
      </section>
    </div>

    <div id="pageStatus" class="muted"></div>
  </main>

  <script type="module" src="/stair-configurator.js"></script>
</body>
</html>
