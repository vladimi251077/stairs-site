<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Проекты лестниц — портфолио Tekstura</title>
  <meta name="description" content="Реализованные проекты премиальных лестниц Tekstura: современные решения для частных домов, вилл и интерьерных пространств.">
  <link rel="canonical" href="https://tekstura.shop/projects.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Tekstura">
  <meta property="og:title" content="Проекты лестниц — портфолио Tekstura">
  <meta property="og:description" content="Реализованные проекты премиальных лестниц Tekstura: современные решения для частных домов, вилл и интерьерных пространств.">
  <meta property="og:url" content="https://tekstura.shop/projects.html">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .projects-wrap{max-width:1140px;margin:0 auto;padding:28px 16px 56px}
    .projects-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:22px}
    .projects-title p{max-width:720px;color:#c9b8a4;margin:8px 0 0}
    .chip{border:1px solid rgba(255,255,255,.18);padding:8px 12px;border-radius:999px;font-size:14px;color:#ead3b5;background:rgba(255,255,255,.03)}
    .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
    .projects-grid.projects-grid--curated{grid-template-columns:repeat(2,minmax(0,1fr));max-width:900px}
    .project-card{border:1px solid rgba(255,255,255,.1);border-radius:18px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));text-decoration:none;color:inherit;transition:transform .22s ease,border-color .22s ease,box-shadow .22s ease;display:flex;flex-direction:column}
    .project-card:hover{transform:translateY(-2px);border-color:rgba(232,200,162,.44);box-shadow:0 16px 28px rgba(0,0,0,.2)}
    .project-card img{width:100%;height:210px;object-fit:cover;background:#201b18}
    .project-body{padding:15px 16px 16px;display:flex;flex-direction:column;gap:8px}
    .project-body h2{margin:0;font-size:21px}
    .project-body p{margin:0;color:#b8aa98;line-height:1.5}
    .project-tags{display:flex;flex-wrap:wrap;gap:8px}
    .project-tag{font-size:12px;padding:5px 9px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#dbc2a3}
    .price{margin-top:4px;font-weight:700;color:#efd8bb}
    .empty,.state{border:1px dashed rgba(255,255,255,.22);padding:18px;border-radius:16px;color:#c5b39e;background:rgba(255,255,255,.02);grid-column:1/-1}
    .loading-skeleton{height:250px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(90deg,rgba(255,255,255,.03),rgba(255,255,255,.08),rgba(255,255,255,.03));background-size:200% 100%;animation:shine 1.5s linear infinite}
    @keyframes shine{to{background-position:-200% 0}}
    @media(max-width:760px){.projects-wrap{padding:20px 14px 40px}.projects-grid.projects-grid--curated{grid-template-columns:1fr}.project-card img{height:190px}}
  </style>
</head>
<body>
  <main class="projects-wrap">
    <div class="projects-top">
      <div class="projects-title">
        <h1>Проекты лестниц Tekstura</h1>
        <p>Кураторская подборка реализованных решений. Даже при небольшом количестве кейсов мы показываем только актуальные проекты с реальными параметрами и ценовым ориентиром.</p>
      </div>
      <div class="chip" id="projectsCount" aria-live="polite">Загрузка коллекции...</div>
    </div>
    <section id="projectsRoot" class="projects-grid" aria-live="polite">
      <div class="loading-skeleton"></div><div class="loading-skeleton"></div><div class="loading-skeleton"></div>
    </section>
  </main>
<script>
const cfg = window.SUPABASE_CONFIG;
const projectsCount = document.getElementById('projectsCount');
const projectsRoot = document.getElementById('projectsRoot');
const client = (cfg?.url && cfg?.anonKey && window.supabase)
  ? window.supabase.createClient(cfg.url, cfg.anonKey)
  : null;
const esc = (s='') => String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
const getPrice = (project) => project.price ? `${project.price} ₽` : (project.price_from ? `от ${project.price_from} ₽` : 'по запросу');
const tagsFor = (project) => {
  const tags = [];
  if (project.category) tags.push(project.category);
  if (project.staircase_type) tags.push(project.staircase_type);
  if (project.lead_time) tags.push(`Срок: ${project.lead_time}`);
  return tags.slice(0, 3);
};

const render = (items=[]) => {
  projectsCount.textContent = items.length ? `Реализованных кейсов: ${items.length}` : 'Кейсы обновляются';
  projectsRoot.classList.toggle('projects-grid--curated', items.length > 0 && items.length <= 2);

  if (!items.length) {
    projectsRoot.innerHTML = '<div class="empty">Сейчас в публичной коллекции мало кейсов. Подберём релевантные реализованные проекты под вашу планировку после короткого брифа.</div>';
    return;
  }

  projectsRoot.innerHTML = items.map((p)=>{
    const title = p.title || 'Проект Tekstura';
    const shortDescription = p.short_description || p.description || 'Индивидуальная инженерная проработка и премиальная реализация.';
    const image = p.cover_image || p.image || '/logo.jpg.png';
    const tags = tagsFor(p);
    return `<a class="project-card" href="/project.html?id=${encodeURIComponent(p.id)}">
      <img src="${esc(image)}" alt="${esc(title)}">
      <div class="project-body">
        <h2>${esc(title)}</h2>
        <p>${esc(shortDescription)}</p>
        ${tags.length ? `<div class="project-tags">${tags.map((tag)=>`<span class="project-tag">${esc(tag)}</span>`).join('')}</div>` : ''}
        <div class="price">${esc(getPrice(p))}</div>
      </div>
    </a>`;
  }).join('');
};

(async function load(){
  try {
    if (!client) {
      projectsCount.textContent = 'Каталог временно в базовом режиме';
      projectsRoot.innerHTML = '<div class="state">Каталог временно недоступен. Оставьте заявку — отправим подборку реальных объектов Tekstura вручную.</div>';
      return;
    }
    const { data, error } = await client.from('projects').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    const items = data || [];
    if (!items.length) return render([]);
    const { data: images } = await client.from('project_images').select('project_id,image_url,is_cover,sort_order').in('project_id', items.map((i)=>i.id)).order('sort_order', { ascending: true });
    const coverMap = new Map();
    (images||[]).forEach((img)=>{ if(!coverMap.has(img.project_id) || img.is_cover) coverMap.set(img.project_id, img.image_url); });
    render(items.map((p)=>({ ...p, cover_image: coverMap.get(p.id) || p.cover_image })));
  } catch (err) {
    console.error(err);
    projectsCount.textContent='Ошибка загрузки коллекции';
    projectsRoot.innerHTML='<div class="state">Не удалось загрузить каталог из Supabase. Оставьте заявку, и менеджер отправит актуальные кейсы из реализованных объектов.</div>';
  }
})();
</script>
</body>
</html>
