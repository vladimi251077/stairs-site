<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tekstura</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #12100f;
      color: #f4e7d4;
      font-family: Arial;
      padding: 20px;
    }
  </style>
</head>
<body>

<h1 id="heroTitle">Загрузка...</h1>
<p id="heroSubtitle"></p>

<img id="heroImage" style="max-width:300px;display:block;margin-top:20px;" />

<script>
const SUPABASE_URL = 'https://rhnlykqqhwweaywjopvm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_kzUBUDdLy1gWGvs-o5jFsw_xkg5-Sqv';

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadData() {
  try {
    const { data, error } = await client
      .from('settings')
      .select('*')
      .eq('id', 1)
      .single();

    if (error) {
      console.error(error);
      document.getElementById('heroTitle').textContent = 'Ошибка загрузки';
      return;
    }

    document.getElementById('heroTitle').textContent = data.heroTitle;
    document.getElementById('heroSubtitle').textContent = data.heroSubtitle;
    document.getElementById('heroImage').src = data.heroImage;

  } catch (e) {
    console.error(e);
  }
}

loadData();
</script>

</body>
</html>
